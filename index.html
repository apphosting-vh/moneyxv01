<!-- Service Worker registration + auto-update detection -->
<script>
(function(){
  if (!('serviceWorker' in navigator)) return;

  /* Store the SW registration so React can post SKIP_WAITING later */
  window.__swReg = null;

  window.addEventListener('load', function(){
    navigator.serviceWorker.register('https://apphosting-vh.github.io/moneyxv01/sw.js', { scope: './' })
      .then(function(reg){
        window.__swReg = reg;
        console.log('[SW] Registered, scope:', reg.scope);

        /* Helper: tell React app an update is staged and ready */
        function notifyUpdateReady() {
          window.dispatchEvent(new CustomEvent('mm:update-ready'));
        }

        /* Case A: SW already waiting when page loads
           (user had the tab open during a deploy, then came back) */
        if (reg.waiting) {
          console.log('[SW] Update already waiting on load');
          notifyUpdateReady();
        }

        /* Case B: New SW starts installing while page is open */
        reg.addEventListener('updatefound', function(){
          var newWorker = reg.installing;
          if (!newWorker) return;
          console.log('[SW] Update found — new worker installing');
          newWorker.addEventListener('statechange', function(){
            /* installed + existing controller = staged, ready to apply */
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              console.log('[SW] New version installed and waiting');
              notifyUpdateReady();
            }
          });
        });

        /* Case C: Periodic check for long-running sessions
           Polls GitHub Pages every 60 min so users with the tab open
           all day still get notified of deployments. */
        setInterval(function(){ reg.update().catch(function(){}); }, 60 * 60 * 1000);

        /* Messages from SW to React */
        navigator.serviceWorker.addEventListener('message', function(e){
          if (e.data && e.data.type === 'SYNC_PRICES') {
            window.dispatchEvent(new CustomEvent('mm:sync-prices'));
          }
        });

        /* controllerchange fires after skipWaiting() activates the new SW.
           The new SW immediately claims clients, so reloading now serves
           the fresh cached HTML. */
        navigator.serviceWorker.addEventListener('controllerchange', function(){
          console.log('[SW] Controller changed — reloading for new version');
          window.location.reload();
        });
      })
      .catch(function(err){
        console.warn('[SW] Registration failed:', err);
      });
  });
}());
</script>

.inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accentbg3)}
.inp::placeholder{color:var(--text5)}
select.inp option{background:var(--inp-opt)}
@keyframes fadeUp{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
@keyframes db-rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes db-bar-grow{from{width:0}to{width:var(--bar-w)}}
@keyframes db-pulse-ring{0%{transform:scale(1);opacity:.5}70%{transform:scale(1.6);opacity:0}100%{transform:scale(1.6);opacity:0}}
.fu{animation:fadeUp .35s ease forwards}
.si{animation:slideIn .25s ease forwards}
.spinr{animation:spin 1s linear infinite;display:inline-block}
.db-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px 20px;transition:box-shadow .2s,border-color .2s}
.db-card:hover{border-color:var(--border3);box-shadow:0 4px 24px rgba(0,0,0,.08)}
.db-acct-card{background:var(--bg4);border:1px solid var(--border);border-radius:14px;padding:14px 16px;flex-shrink:0;transition:transform .2s,box-shadow .2s,border-color .2s;cursor:default}
.db-acct-card:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,.12);border-color:var(--border3)}
.db-txrow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border2);gap:10px;transition:background .12s;border-radius:6px}
.db-txrow:hover{background:var(--accentbg2);padding-left:6px;padding-right:6px}
.db-txrow:last-child{border-bottom:none}
.db-pulse-bar-fill{height:6px;border-radius:3px;transition:width 1s cubic-bezier(.22,1,.36,1)}
.tr:hover{background:var(--accentbg2)!important}
.nb:hover{background:var(--accentbg4)!important;color:var(--accent2)!important}
.accard{cursor:pointer;transition:border-color .2s,transform .15s,box-shadow .2s}
.accard:hover{border-color:var(--accent)44!important;transform:translateY(-1px)}
.accard.active{border-color:var(--accent)!important;box-shadow:0 0 0 2px var(--accentbg5)!important}
.mr:hover{background:var(--mr-hover)!important}
.txrow{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-bottom:1px solid var(--border3);transition:background .15s;gap:12px}
.txrow:hover{background:var(--accentbg2)}
.txrow:last-child{border-bottom:none}
textarea.inp{resize:vertical}
/* Ledger table */
.ldg-row{transition:background .1s;cursor:pointer;border-left:3px solid transparent}
.ldg-row:hover{background:var(--accentbg2)!important}
.ldg-row.ldg-sel{background:var(--accentbg)!important;border-left:3px solid var(--accent)!important}
.tb-btn{padding:5px 12px;border-radius:7px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;transition:all .15s;white-space:nowrap}
.tb-btn:disabled{opacity:.38;cursor:not-allowed}

/* ── RESPONSIVE SIDEBAR ── */
/* Sidebar collapse toggle */
.nav-collapse-btn{
  width:100%;display:flex;align-items:center;justify-content:center;
  background:transparent;border:none;cursor:pointer;
  color:var(--text6);transition:color .15s,background .15s;
  padding:9px 0;font-size:13px;
  border-top:1px solid var(--border2);
}
.nav-collapse-btn:hover{background:var(--accentbg2);color:var(--accent);}
.sidebar-panel{transition:width .2s cubic-bezier(.4,0,.2,1),min-width .2s cubic-bezier(.4,0,.2,1);}
.nb-tip{position:relative}
.nb-tip .nb-tooltip{
  position:absolute;left:calc(100% + 10px);top:50%;transform:translateY(-50%);
  background:var(--bg3);border:1px solid var(--border);
  color:var(--text2);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;
  padding:5px 10px;border-radius:8px;white-space:nowrap;
  box-shadow:0 4px 16px rgba(0,0,0,.35);
  pointer-events:none;opacity:0;transition:opacity .15s;z-index:9999;
}
.nb-tip:hover .nb-tooltip{opacity:1}
.nb-icon-only{
  display:flex!important;align-items:center!important;justify-content:center!important;
  width:44px!important;height:44px!important;border-radius:12px!important;
  padding:0!important;margin:0 auto 4px auto!important;
  border-left:none!important;
}
.nb-icon-active{
  background:var(--accentbg)!important;
  box-shadow:0 0 0 2px var(--accentbg5);
}
@media(max-width:768px){
  .mobile-content-panel{padding:14px 10px 32px!important;}
  /* Toolbar wraps on mobile */
  .tb-toolbar{flex-wrap:wrap!important;}
  /* Hide ledger table on mobile - use card list instead */
  .ldg-table-hdr{display:none!important;}
  .ldg-mobile-card{display:flex!important;}
  .ldg-desktop-row{display:none!important;}
}
  /* Modal backdrop: on mobile, offset left by sidebar width (64px) so modal
     centers within the content area, not the full viewport */
  @media (max-width: 768px) {
    .modal-bd {
      left: 64px !important;
    }
    /* Ensure modal inner content uses full available width */
    .modal-bd .fu {
      width: 100%;
      max-width: 100% !important;
    }
  }
  /* Responsive 2-column grid inside modals: 2-col on desktop, 1-col on mobile */
  .grid-2col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  @media (max-width: 520px) {
    .modal-bd .grid-2col {
      grid-template-columns: 1fr;
    }
  }

  {version:"2.4.1",date:"2026-03-05",title:"Sticky Header Width Fix + toggleOne Bug Fix",changes:[
    "Critical fix: sticky header used width:100% which browsers resolve against the SCROLL CONTAINER viewport (not the containing block) once the element enters stuck state — causing the header to be narrower than body rows on screens < 980px",
    "Header now uses minWidth:980 (same as the body rows) instead of width:100% — this forces the sticky element to maintain the same minimum width as all rows regardless of sticky state",
    "Body rows changed from width:100% to minWidth:980 for consistent width calculation matching the header exactly",
    "Result: header and body grid columns stay pixel-perfect aligned at ALL scroll positions — vertical, horizontal, and combined",
    "Bug fix: toggleOne() was referenced in checkbox onChange handler but was never defined — caused a ReferenceError on every row checkbox click. Added const toggleOne=(id)=>{...} alongside toggleAll",
  ]},
  {version:"2.4.0",date:"2026-03-05",title:"Transaction Table Scroll Fix — Header/Body Alignment",changes:[
    "Root cause identified: two nested competing scroll containers caused header/body column misalignment on horizontal scroll",
    "Old structure: outer div (overflow:auto + flex-column) contained an inner body div (overflowY:auto + flex:1) — two separate scroll contexts",
    "When scrolling horizontally, the sticky header moved with the outer scroll context but body rows were locked in the inner context — causing the visible misalignment",
    "Fix: replaced dual-scroll structure with a single unified scroll container (overflow:auto) that owns both the header and all body rows",
    "Added an inner minWidth:980 table wrapper so grid columns never squish on narrow screens — horizontal scroll triggers on the unified container",
    "Header position:sticky top:0 now works correctly — it sticks within the SAME scroll context as the body rows",
    "Removed minWidth:900 and flexShrink:0 from the header row and minWidth:900 from each body row — the wrapper handles minimum width once",
    "Result: header and body columns are perfectly aligned at all viewport widths and at all horizontal scroll positions",
  ]},

/* helpers for category tree */
const catColor=(cats,name)=>{
  for(const c of cats){if(c.name===name)return c.color;for(const sc of c.subs)if(sc.name===name)return c.color;}
  return CAT_C[name]||"#8ba0c0";
};
const flatCats=(cats)=>cats.flatMap(c=>[c.name,...c.subs.map(s=>c.name+"::"+s.name)]);
const catDisplayName=(full)=>full.includes("::")?full.split("::")[1]:full;
const catMainName=(full)=>full.includes("::")?full.split("::")[0]:full;
const catClassType=(cats,catValue)=>{const main=catMainName(catValue);const found=cats.find(c=>c.name===main);return found?found.classType||"Expense":"Expense";};
const CLASS_TYPES=["Income","Expense","Investment","Transfer","Others"];
const CLASS_C={Income:"#22c55e",Expense:"#ef4444",Investment:"#a78bfa",Transfer:"#60a5fa",Others:"#8ba0c0"};
const CLASS_ICON={Income:"💰",Expense:"💸",Investment:"📈",Transfer:"🔄",Others:"🗂"};

/* ── Returns the configured default payee name for a category value.
   Sub-category defaultPayee takes priority; falls back to main category.
   Returns "" when no default is set. ─────────────────────────────────── */
const getDefaultPayee=(cats,catValue)=>{
  if(!catValue||!cats||!cats.length)return"";
  const mainName=catMainName(catValue);
  const isSubCat=catValue.includes("::");
  const subName=isSubCat?catValue.split("::")[1]:"";
  const mainCat=cats.find(c=>c.name===mainName);
  if(!mainCat)return"";
  if(isSubCat){
    const sub=(mainCat.subs||[]).find(s=>s.name===subName);
    if(sub&&sub.defaultPayee)return sub.defaultPayee;
  }
  return mainCat.defaultPayee||"";
};

/* ── SHARED HIERARCHICAL CATEGORY OPTIONS BUILDER ────────────────────────
   Returns an array of React <optgroup> elements grouped by ClassType.
   Structure:
     💰 Income
       Income ▸  (selectable as "Income")
         ↳ Salary  (selectable as "Income::Salary")
         ↳ Freelance
     💸 Expense
       Housing ▸
         ↳ Rent
         ↳ Maintenance
       Food ▸  ...
   Usage: put inside a <select> along with a leading Uncategorised option.
   ─────────────────────────────────────────────────────────────────────── */
const buildCatOptions=(categories)=>{
  const cats=categories||[];
  // Bucket main categories by their classType
  const byClass={};
  CLASS_TYPES.forEach(ct=>{byClass[ct]=[];});
  cats.forEach(c=>{
    const ct=c.classType||"Expense";
    if(!byClass[ct])byClass[ct]=[];
    byClass[ct].push(c);
  });
  return CLASS_TYPES
    .filter(ct=>byClass[ct]&&byClass[ct].length>0)
    .map(ct=>{
      const mainCats=byClass[ct];
      return React.createElement("optgroup",{key:ct,label:CLASS_ICON[ct]+" "+ct},
        mainCats.flatMap(c=>[
          // Main category option — shows "Housing ▸" when it has subs
          React.createElement("option",{key:c.id,value:c.name},
            c.name+(c.subs&&c.subs.length?" ▸":"")),
          // Sub-category options, visually indented with ↳
          ...(c.subs||[]).map(sc=>
            React.createElement("option",{key:sc.id,value:c.name+"::"+sc.name},
              "    ↳ "+sc.name)
          )
        ])
      );
    });
};

const calcFDMaturity=(principal,ratePercent,startDate,maturityDate)=>{
  if(!principal||!ratePercent||!startDate||!maturityDate)return principal||0;
  const start=new Date(startDate),end=new Date(maturityDate);
  const days=Math.max(0,Math.round((end-start)/(1000*60*60*24)));
  const years=days/365;
  const r=ratePercent/100;
  const maturity=principal*Math.pow(1+r/4,4*years);
  return Math.round(maturity);
};

const reducer=(s,a)=>{
  switch(a.type){
    case"ADD_BANK":return{...s,banks:[...s.banks,a.p]};
    case"ADD_BANK_TX":return{...s,banks:s.banks.map(b=>b.id===a.id?{...b,transactions:[...b.transactions,a.tx]}:b)};
    case"UPD_BANK_BAL":return{...s,banks:s.banks.map(b=>b.id===a.id?{...b,balance:b.balance+(a.tx.type==="credit"?a.tx.amount:-a.tx.amount)}:b)};
    case"EDIT_BANK_TX":return{...s,banks:s.banks.map(b=>b.id===a.accId?{...b,
      balance:b.balance-(a.old.type==="credit"?a.old.amount:-a.old.amount)+(a.tx.type==="credit"?a.tx.amount:-a.tx.amount),
      transactions:b.transactions.map(t=>t.id===a.tx.id?a.tx:t)}:b)};
    case"DEL_BANK_TX":return{...s,banks:s.banks.map(b=>b.id===a.accId?{...b,
      balance:b.balance-(a.tx.type==="credit"?a.tx.amount:-a.tx.amount),
      transactions:b.transactions.filter(t=>t.id!==a.tx.id)}:b)};
    case"DUP_BANK_TX":return{...s,banks:s.banks.map(b=>b.id===a.accId?{...b,
      balance:b.balance+(a.tx.type==="credit"?a.tx.amount:-a.tx.amount),
      transactions:[...b.transactions,{...a.tx,id:uid()}]}:b)};
    case"REORDER_BANKS":{const bs=[...s.banks];const[mv]=bs.splice(a.from,1);bs.splice(a.to,0,mv);return{...s,banks:bs};}
    case"EDIT_BANK":return{...s,banks:s.banks.map(b=>b.id===a.p.id?{...b,...a.p}:b)};
    case"DEL_BANK":return{...s,banks:s.banks.filter(b=>b.id!==a.id)};
    case"ADD_CARD":return{...s,cards:[...s.cards,a.p]};

    case"EDIT_CARD_TX":return{...s,cards:s.cards.map(c=>c.id===a.accId?{...c,
      outstanding:c.outstanding-(a.old.type==="debit"?a.old.amount:-a.old.amount)+(a.tx.type==="debit"?a.tx.amount:-a.tx.amount),
      transactions:c.transactions.map(t=>t.id===a.tx.id?a.tx:t)}:c)};
    case"DEL_CARD_TX":return{...s,cards:s.cards.map(c=>c.id===a.accId?{...c,
      outstanding:c.outstanding-(a.tx.type==="debit"?a.tx.amount:-a.tx.amount),
      transactions:c.transactions.filter(t=>t.id!==a.tx.id)}:c)};
    case"DUP_CARD_TX":return{...s,cards:s.cards.map(c=>c.id===a.accId?{...c,
      outstanding:c.outstanding+(a.tx.type==="debit"?a.tx.amount:-a.tx.amount),
      transactions:[...c.transactions,{...a.tx,id:uid()}]}:c)};
    case"EDIT_CARD":return{...s,cards:s.cards.map(c=>c.id===a.p.id?{...c,...a.p}:c)};
    case"DEL_CARD":return{...s,cards:s.cards.filter(c=>c.id!==a.id)};
    case"ADD_CASH_TX":return{...s,cash:{balance:s.cash.balance+(a.tx.type==="credit"?a.tx.amount:-a.tx.amount),transactions:[...s.cash.transactions,a.tx]}};
    case"SET_CASH_BAL":return{...s,cash:{...s.cash,balance:a.val}};
    case"EDIT_CASH_TX":return{...s,cash:{...s.cash,
      balance:s.cash.balance-(a.old.type==="credit"?a.old.amount:-a.old.amount)+(a.tx.type==="credit"?a.tx.amount:-a.tx.amount),
      transactions:s.cash.transactions.map(t=>t.id===a.tx.id?a.tx:t)}};
    case"DEL_CASH_TX":return{...s,cash:{...s.cash,
      balance:s.cash.balance-(a.tx.type==="credit"?a.tx.amount:-a.tx.amount),
      transactions:s.cash.transactions.filter(t=>t.id!==a.tx.id)}};
    case"DUP_CASH_TX":return{...s,cash:{...s.cash,
      balance:s.cash.balance+(a.tx.type==="credit"?a.tx.amount:-a.tx.amount),
      transactions:[...s.cash.transactions,{...a.tx,id:uid()}]}};
    case"ADD_MF":return{...s,mf:[...s.mf,a.p]};
    case"EDIT_MF":return{...s,mf:s.mf.map(m=>m.id===a.p.id?{...m,...a.p}:m)};
    case"UPD_MF_NAV":return{...s,mf:a.p};
    case"DEL_MF":return{...s,mf:s.mf.filter(m=>m.id!==a.id)};
    case"ADD_SHARE":return{...s,shares:[...s.shares,a.p]};
    case"EDIT_SHARE":return{...s,shares:s.shares.map(sh=>sh.id===a.p.id?{...sh,...a.p}:sh)};
    case"DEL_SHARE":return{...s,shares:s.shares.filter(sh=>sh.id!==a.id)};
    case"ADD_FD":return{...s,fd:[...s.fd,a.p]};
    case"ADD_RE":return{...s,re:[...s.re,a.p]};
    case"EDIT_RE":return{...s,re:s.re.map(r=>r.id===a.p.id?{...r,...a.p}:r)};
    case"DEL_RE":return{...s,re:s.re.filter(r=>r.id!==a.id)};
    case"EDIT_FD":return{...s,fd:s.fd.map(f=>f.id===a.p.id?{...f,...a.p}:f)};
    case"DEL_FD":return{...s,fd:s.fd.filter(f=>f.id!==a.id)};
    case"IMPORT_BULK_MF":return{...s,mf:[...s.mf,...(a.items||[])]};
    case"IMPORT_BULK_FD":return{...s,fd:[...s.fd,...(a.items||[])]};
    case"ADD_LOAN":return{...s,loans:[...s.loans,a.p]};
    case"EDIT_LOAN":return{...s,loans:s.loans.map(l=>l.id===a.p.id?{...l,...a.p}:l)};
    case"DEL_LOAN":return{...s,loans:s.loans.filter(l=>l.id!==a.id)};
    case"ADD_CAT":return{...s,categories:[...s.categories,{id:"c_"+uid(),name:a.name,color:a.color||"#8ba0c0",classType:a.classType||"Expense",defaultPayee:a.defaultPayee||"",subs:[]}]};
    case"DEL_CAT":return{...s,categories:s.categories.filter(c=>c.id!==a.id)};
    case"EDIT_CAT":{
      /* Cascade rename: update every transaction whose cat starts with the old main-category name */
      const _oldCat=s.categories.find(c=>c.id===a.p.id);
      const _oldCatName=_oldCat?_oldCat.name:"";
      const _newCatName=a.p.name!==undefined?a.p.name:_oldCatName;
      const updCats=s.categories.map(c=>c.id===a.p.id?{...c,...a.p}:c);
      if(!_oldCatName||_oldCatName===_newCatName)return{...s,categories:updCats};
      const _renamecat=cat=>{if(!cat)return cat;if(cat===_oldCatName)return _newCatName;if(cat.startsWith(_oldCatName+"::"))return _newCatName+"::"+cat.slice(_oldCatName.length+2);return cat;};
      const _updTxCat=t=>({...t,cat:_renamecat(t.cat||"")});
      return{...s,categories:updCats,
        banks:s.banks.map(b=>({...b,transactions:b.transactions.map(_updTxCat)})),
        cards:s.cards.map(c=>({...c,transactions:c.transactions.map(_updTxCat)})),
        cash:{...s.cash,transactions:s.cash.transactions.map(_updTxCat)},
        scheduled:(s.scheduled||[]).map(sc=>({...sc,cat:_renamecat(sc.cat||"")})),
      };
    }
    case"ADD_SUBCAT":return{...s,categories:s.categories.map(c=>c.id===a.catId?{...c,subs:[...c.subs,{id:"cs_"+uid(),name:a.name,defaultPayee:a.defaultPayee||""}]}:c)};
    case"DEL_SUBCAT":return{...s,categories:s.categories.map(c=>c.id===a.catId?{...c,subs:c.subs.filter(sc=>sc.id!==a.subId)}:c)};
    case"EDIT_SUBCAT":{
      /* Cascade rename: update every transaction whose cat is "MainName::OldSubName" */
      const _parentCat=s.categories.find(c=>c.id===a.catId);
      const _oldSub=_parentCat?((_parentCat.subs)||[]).find(sc=>sc.id===a.subId):null;
      const _oldSubName=_oldSub?_oldSub.name:"";
      const _newSubName=a.name!==undefined?a.name:_oldSubName;
      const updSubCats=s.categories.map(c=>c.id===a.catId?{...c,subs:c.subs.map(sc=>sc.id===a.subId?{...sc,name:a.name!==undefined?a.name:sc.name,defaultPayee:a.defaultPayee!==undefined?a.defaultPayee:sc.defaultPayee||""}:sc)}:c);
      if(!_oldSubName||!_parentCat||_oldSubName===_newSubName)return{...s,categories:updSubCats};
      const _oldFull=_parentCat.name+"::"+_oldSubName;
      const _newFull=_parentCat.name+"::"+_newSubName;
      const _renameSubcat=cat=>cat===_oldFull?_newFull:cat;
      const _updTxSubcat=t=>({...t,cat:_renameSubcat(t.cat||"")});
      return{...s,categories:updSubCats,
        banks:s.banks.map(b=>({...b,transactions:b.transactions.map(_updTxSubcat)})),
        cards:s.cards.map(c=>({...c,transactions:c.transactions.map(_updTxSubcat)})),
        cash:{...s.cash,transactions:s.cash.transactions.map(_updTxSubcat)},
        scheduled:(s.scheduled||[]).map(sc=>({...sc,cat:_renameSubcat(sc.cat||"")})),
      };
    }
    case"ADD_SCHEDULED":return{...s,scheduled:[...( s.scheduled||[]),{...a.p,id:uid()}]};
    case"DEL_SCHEDULED":return{...s,scheduled:(s.scheduled||[]).filter(sc=>sc.id!==a.id)};
    case"EDIT_SCHEDULED":return{...s,scheduled:(s.scheduled||[]).map(sc=>sc.id===a.p.id?{...sc,...a.p}:sc)};
    case"EXECUTE_SCHEDULED":{
      /* Fire scheduled tx into the target account and mark as lastExecuted */
      const sc=a.sc;
      const tx={id:uid(),date:sc.nextDate,desc:sc.desc,payee:sc.payee,amount:sc.amount,type:sc.ledgerType,cat:sc.cat,txType:sc.txType,tags:sc.tags||"",status:"Reconciled",txNum:"",notes:sc.notes||("Scheduled: "+sc.desc)};
      let ns={...s};
      if(sc.accType==="bank")ns={...ns,banks:ns.banks.map(b=>b.id===sc.accId?{...b,balance:b.balance+(tx.type==="credit"?tx.amount:-tx.amount),transactions:[...b.transactions,tx]}:b)};
      else if(sc.accType==="card")ns={...ns,cards:ns.cards.map(c=>c.id===sc.accId?{...c,outstanding:c.outstanding+(tx.type==="debit"?tx.amount:-tx.amount),transactions:[...c.transactions,tx]}:c)};
      else if(sc.accType==="cash")ns={...ns,cash:{...ns.cash,balance:ns.cash.balance+(tx.type==="credit"?tx.amount:-tx.amount),transactions:[...ns.cash.transactions,tx]}};
      /* Advance nextDate based on frequency */
      const advance=(d,freq)=>{const dt=new Date(d+"T12:00:00");if(freq==="daily")dt.setDate(dt.getDate()+1);else if(freq==="weekly")dt.setDate(dt.getDate()+7);else if(freq==="monthly")dt.setMonth(dt.getMonth()+1);else if(freq==="quarterly")dt.setMonth(dt.getMonth()+3);else if(freq==="yearly")dt.setFullYear(dt.getFullYear()+1);return dt.toISOString().split("T")[0];};
      const isOnce=sc.frequency==="once";
      const newNext=isOnce?null:advance(sc.nextDate,sc.frequency);
      const expired=isOnce||(sc.endDate&&newNext>sc.endDate);
      ns={...ns,scheduled:(ns.scheduled||[]).map(x=>x.id===sc.id?{...x,lastExecuted:sc.nextDate,nextDate:expired?null:newNext,status:expired?"completed":"active"}:x)};
      return ns;
    }
    /* Transfer: debit source, credit target -- supports bank/cash/card */
    case"TRANSFER_TX":{
      const{srcType,srcId,tgtType,tgtId,tx}=a;
      const debitTx={...tx,type:"debit",id:uid(),cat:tx.cat||"Transfer"};
      const creditTx={...tx,type:"credit",id:uid(),desc:tx.desc||"Transfer In",cat:tx.cat||"Transfer"};
      let ns={...s};
      // ── debit source
      if(srcType==="bank")
        ns={...ns,banks:ns.banks.map(b=>b.id===srcId?{...b,balance:b.balance-tx.amount,transactions:[...b.transactions,debitTx]}:b)};
      else if(srcType==="cash")
        ns={...ns,cash:{...ns.cash,balance:ns.cash.balance-tx.amount,transactions:[...ns.cash.transactions,debitTx]}};
      else if(srcType==="card")
        // paying FROM a card = cash advance: increases outstanding
        ns={...ns,cards:ns.cards.map(c=>c.id===srcId?{...c,outstanding:c.outstanding+tx.amount,transactions:[...c.transactions,debitTx]}:c)};
      // ── credit target
      if(tgtType==="bank")
        ns={...ns,banks:ns.banks.map(b=>b.id===tgtId?{...b,balance:b.balance+tx.amount,transactions:[...b.transactions,creditTx]}:b)};
      else if(tgtType==="cash")
        ns={...ns,cash:{...ns.cash,balance:ns.cash.balance+tx.amount,transactions:[...ns.cash.transactions,creditTx]}};
      else if(tgtType==="card")
        // paying TO a card = bill payment: reduces outstanding
        ns={...ns,cards:ns.cards.map(c=>c.id===tgtId?{...c,outstanding:Math.max(0,c.outstanding-tx.amount),transactions:[...c.transactions,{...creditTx,desc:tx.desc||"Card Payment"}]}:c)};
      return ns;
    }
    case"ADD_PAYEE":return{...s,payees:[...s.payees,a.p]};
    case"EDIT_PAYEE":{
      /* Cascade rename: update every transaction whose payee matches the old name */
      const _oldPayee=s.payees.find(p=>p.id===a.p.id);
      const _oldPayeeName=_oldPayee?_oldPayee.name:"";
      const _newPayeeName=a.p.name!==undefined?a.p.name:_oldPayeeName;
      const updPayees=s.payees.map(p=>p.id===a.p.id?{...p,...a.p}:p);
      if(!_oldPayeeName||_oldPayeeName===_newPayeeName)return{...s,payees:updPayees};
      const _renamePayee=p=>p===_oldPayeeName?_newPayeeName:p;
      const _updTxPayee=t=>({...t,payee:_renamePayee(t.payee||"")});
      return{...s,payees:updPayees,
        banks:s.banks.map(b=>({...b,transactions:b.transactions.map(_updTxPayee)})),
        cards:s.cards.map(c=>({...c,transactions:c.transactions.map(_updTxPayee)})),
        cash:{...s.cash,transactions:s.cash.transactions.map(_updTxPayee)},

    case"DEL_PAYEE":return{...s,payees:s.payees.filter(p=>p.id!==a.id)};

    case"MASS_UPDATE_CAT":{

      const applyPayee=payee!==undefined;

      if(at==="bank")return{...s,banks:s.banks.map(b=>b.id!==aid?b:{...b,transactions:b.transactions.map(upd)})};
      if(at==="card")return{...s,cards:s.cards.map(c=>c.id!==aid?c:{...c,transactions:c.transactions.map(upd)})};
      if(at==="cash")return{...s,cash:{...s.cash,transactions:s.cash.transactions.map(upd)}};

    case"RESTORE_ALL":return{...INIT(),...a.data};
    case"RESET_ALL":return{...EMPTY_STATE()};
    /* Bulk import: a.accType = bank|card|cash, a.accId, a.txns = array of tx objects */
    case"IMPORT_BULK_TX":{
      const{accType,accId,txns}=a;
      if(!txns||!txns.length)return s;
      if(accType==="bank"){
        return{...s,banks:s.banks.map(b=>{
          if(b.id!==accId)return b;
          const netDelta=txns.reduce((d,t)=>d+(t.type==="credit"?t.amount:-t.amount),0);
          return{...b,transactions:[...b.transactions,...txns],balance:b.balance+netDelta};
        })};
      }
      if(accType==="card"){
        return{...s,cards:s.cards.map(c=>{
          if(c.id!==accId)return c;
          // credits = payments (reduce outstanding), debits = purchases (increase outstanding)
          const netDelta=txns.reduce((d,t)=>d+(t.type==="debit"?t.amount:-t.amount),0);
          return{...c,transactions:[...c.transactions,...txns],outstanding:Math.max(0,c.outstanding+netDelta)};
        })};
      }
      if(accType==="cash"){
        const netDelta=txns.reduce((d,t)=>d+(t.type==="credit"?t.amount:-t.amount),0);
        return{...s,cash:{...s.cash,transactions:[...s.cash.transactions,...txns],balance:s.cash.balance+netDelta}};
      }
      return s;
    }
    case"ADD_NOTE":return{...s,notes:[...( s.notes||[]),{...a.p,id:uid(),createdAt:new Date().toISOString()}]};
    case"EDIT_NOTE":return{...s,notes:(s.notes||[]).map(n=>n.id===a.p.id?{...n,...a.p,updatedAt:new Date().toISOString()}:n)};
    case"DEL_NOTE":return{...s,notes:(s.notes||[]).filter(n=>n.id!==a.id)};

      const existing=new Set(s.categories.map(c=>c.name.toLowerCase()));

    }
    default:return s;
  }
};

const DonutChart=({data,size=170})=>{
  const total=data.reduce((s,d)=>s+d.value,0);
  if(!total)return React.createElement("div",{style:{textAlign:"center",color:"#345",padding:20,fontSize:12}},"No data");
  let angle=-90;
  const cx=size/2,cy=size/2,r=size*.38,ir=size*.23;
  const slices=data.map((d,i)=>{
    const sweep=(d.value/total)*360;
    const a1=angle*(Math.PI/180),a2=(angle+sweep)*(Math.PI/180);
    const x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1);
    const x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
    const xi1=cx+ir*Math.cos(a1),yi1=cy+ir*Math.sin(a1);
    const xi2=cx+ir*Math.cos(a2),yi2=cy+ir*Math.sin(a2);
    const lg=sweep>180?1:0;
    const path=`M${x1},${y1} A${r},${r} 0 ${lg},1 ${x2},${y2} L${xi2},${yi2} A${ir},${ir} 0 ${lg},0 ${xi1},${yi1} Z`;
    angle+=sweep;
    return React.createElement("path",{key:i,d:path,fill:PAL[i%PAL.length],opacity:.9});
  });
  return React.createElement("svg",{width:size,height:size,viewBox:`0 0 ${size} ${size}`,style:{display:"block",margin:"0 auto"}},
    ...slices,React.createElement("circle",{cx,cy,r:ir-2,fill:"var(--bg3)"})
  );
};
const SvgBar=({data,h=155})=>{

  const W=300,pad=28,bW=Math.min(26,(W-pad*2)/data.length-6),gap=(W-pad*2)/data.length;
  return React.createElement("svg",{width:"100%",viewBox:`0 0 300 ${h+28}`,style:{display:"block"}},
    ...data.map((d,i)=>{
      const bh=Math.max(((d.amount/max)*(h-8)),2),x=pad+i*gap+gap/2-bW/2,y=h-bh;

        React.createElement("rect",{x,y,width:bW,height:bh,rx:3,fill:"var(--accent)",opacity:.85}),
        React.createElement("text",{x:x+bW/2,y:h+16,textAnchor:"middle",fill:"var(--text4)",fontSize:10},d.month)

};

/* Common column name aliases for auto-detection */
const COL_ALIASES={
  date:    ["date","txn date","transaction date","value date","posting date","trans date","dated","dt"],
  amount:  ["amount","amt","debit amount","credit amount","transaction amount","txn amount","inr","rs"],
  debit:   ["debit","dr","withdrawal","withdrawals","debit amount","spent","dr amount"],
  credit:  ["credit","cr","deposit","deposits","credit amount","received","cr amount"],
  desc:    ["description","narration","details","particulars","remarks","memo","reference","txn remarks","transaction details","desc"],
  payee:   ["payee","merchant","vendor","name","beneficiary","party name"],
  type:    ["type","transaction type","txn type","dr/cr","cr/dr","mode"],
  balance: ["balance","closing balance","avail balance","available balance"],
  ref:     ["reference","ref no","ref number","chq no","cheque no","utr","utr no","transaction id","txn id"],
  notes:   ["notes","narration2","remark","additional info"],
  cat:     ["category","cat","tag"],
};

const detectCol=(headers,aliases)=>{
  const lc=headers.map(h=>(h||"").toString().toLowerCase().trim());
  for(const alias of aliases){
    const idx=lc.findIndex(h=>h===alias||h.includes(alias));
    if(idx>=0)return headers[idx];
  }
  return "";
};

const parseDate=(raw)=>{
  if(!raw)return TODAY();
  // Excel serial date number
  if(typeof raw==="number"){
    const d=new Date(Math.round((raw-25569)*86400*1000));
    return d.toISOString().split("T")[0];
  }
  const s=raw.toString().trim();
  // dd-mm-yyyy or dd/mm/yyyy
  const dmy=s.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})$/);
  if(dmy){
    const [,d,m,y]=dmy;
    const yr=y.length===2?"20"+y:y;
    return `${yr}-${m.padStart(2,"0")}-${d.padStart(2,"0")}`;
  }
  // yyyy-mm-dd
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
  // mm/dd/yyyy
  const mdy=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
  if(mdy){
    const[,m,d,y]=mdy;
    const yr=y.length===2?"20"+y:y;
    return `${yr}-${m.padStart(2,"0")}-${d.padStart(2,"0")}`;
  }
  // Try native parse as fallback
  try{
    const dt=new Date(s);
    if(!isNaN(dt))return dt.toISOString().split("T")[0];
  }catch{}
  return TODAY();
};

const parseAmt=(raw)=>{
  if(raw===null||raw===undefined||raw==="")return 0;
  const n=parseFloat(raw.toString().replace(/[^0-9.\-]/g,""));
  return isNaN(n)?0:Math.abs(n);
};

          wb=XL.read(data,{type:"string",raw:false});
        }else{

        }
        const ws=wb.Sheets[wb.SheetNames[0]];
        const jsonRows=XL.utils.sheet_to_json(ws,{header:1,defval:"",raw:true});
        // Find header row -- first row with >2 non-empty cells
        let hdrIdx=0;
        for(let i=0;i<Math.min(10,jsonRows.length);i++){

        setRows(dataRows);

        const autoMap={};
        for(const fd of fieldDefs){
          const found=detectCol(hdrs,COL_ALIASES[fd.key]||[fd.key.toLowerCase()]);
          if(found)autoMap[fd.key]=found;
        }
        setMap(autoMap);
        setStep("map");
      }catch(err){setParseError("Failed to parse file: "+err.message);}
    };
    if(file.name.toLowerCase().endsWith(".csv")){
      reader.readAsText(file);
    }else{
      reader.readAsArrayBuffer(file);
    }
    e.target.value="";
  };

  /* ── Build preview transactions from mapped columns */
  const buildPreview=()=>{
    const txns=[];
    const skipped=[];
    rows.forEach((row,i)=>{
      const get=key=>{
        const col=map[key];
        if(!col)return "";
        const idx=headers.indexOf(col);
        return idx>=0?(row[idx]??""): "";
      };
      // Date
      const rawDate=get("date");
      const date=parseDate(rawDate||"");
      // Amount logic
      let amount=0;
      let type="debit";
      const debitVal=parseAmt(get("debit"));
      const creditVal=parseAmt(get("credit"));

/* ══════════════════════════════════════════════════════════════════════════
   PAYEE COMBOBOX  -- custom styled dropdown, consistent across all themes
   Props: value, onChange, payees (array of {id,name}), placeholder
   ══════════════════════════════════════════════════════════════════════════ */
const PayeeCombobox=({value,onChange,payees,placeholder="Search or type payee…",compact=false})=>{
  const[open,setOpen]=useState(false);
  const[query,setQuery]=useState(value||"");
  const wrapRef=React.useRef(null);

  /* Sync query when value changes externally (e.g. form reset) */
  React.useEffect(()=>{setQuery(value||"");},[value]);

  /* Close on outside click */
  React.useEffect(()=>{
    if(!open)return;
    const handler=e=>{if(wrapRef.current&&!wrapRef.current.contains(e.target))setOpen(false);};
    document.addEventListener("mousedown",handler);
    return()=>document.removeEventListener("mousedown",handler);
  },[open]);

  const filtered=query.trim()===""
    ?payees
    :payees.filter(p=>p.name.toLowerCase().includes(query.toLowerCase()));

  const pick=(name)=>{setQuery(name);onChange(name);setOpen(false);};
  const clear=()=>{setQuery("");onChange("");setOpen(false);};

  const handleInput=e=>{
    const val=e.target.value;
    setQuery(val);
    onChange(val);
    setOpen(true);
  };

  const handleFocus=()=>setOpen(true);

  const handleKeyDown=e=>{
    if(e.key==="Escape"){setOpen(false);e.target.blur();}
    if(e.key==="Enter"&&filtered.length>0){pick(filtered[0].name);e.preventDefault();}
  };

  /* ── COMPACT mode: trigger-button like CatCombobox, search inside dropdown ── */
  if(compact){
    const displayName=value||"";
    const initials=displayName?displayName.charAt(0).toUpperCase():"";
    return React.createElement("div",{ref:wrapRef,style:{position:"relative",width:"100%"}},
      /* Trigger */
      React.createElement("div",{
        onClick:e=>{e.stopPropagation();setOpen(o=>!o);},
        style:{
          display:"flex",alignItems:"center",gap:6,
          border:"1px solid "+(value?"var(--accent)55":"var(--border2)"),
          borderRadius:7,padding:"3px 6px",
          cursor:"pointer",width:"100%",minWidth:0,
          background:"transparent",transition:"border-color .15s"
        }
      },
        value
          ?React.createElement("span",{style:{
              width:18,height:18,borderRadius:"50%",
              background:"var(--accentbg)",border:"1px solid var(--border)",
              display:"inline-flex",alignItems:"center",justifyContent:"center",
              fontSize:9,fontWeight:700,color:"var(--accent)",flexShrink:0
            }},initials)
          :React.createElement("span",{style:{
              width:14,height:14,borderRadius:"50%",
              border:"1px dashed var(--border)",flexShrink:0,display:"inline-block"
            }}),
        React.createElement("span",{style:{
          flex:1,fontSize:11,
          color:value?"var(--text2)":"var(--text6)",
          fontWeight:value?500:400,
          overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",
          fontFamily:"'DM Sans',sans-serif"
        }},displayName||placeholder),
        React.createElement("span",{style:{fontSize:9,color:"var(--text6)",flexShrink:0}},open?"▲":"▼")
      ),
      /* Dropdown */
      open&&React.createElement("div",{
        onClick:e=>e.stopPropagation(),
        style:{
          position:"absolute",top:"calc(100% + 3px)",left:0,right:0,zIndex:3000,
          background:"var(--modal-bg)",border:"1px solid var(--border)",
          borderRadius:10,boxShadow:"0 8px 28px rgba(0,0,0,.5)",
          display:"flex",flexDirection:"column",
          maxHeight:240,minWidth:180
        }
      },
        /* Search input */
        React.createElement("div",{style:{padding:"7px 9px",borderBottom:"1px solid var(--border2)",flexShrink:0}},
          React.createElement("input",{
            className:"inp",
            placeholder:"🔍 Search payees…",
            value:query,
            onChange:handleInput,
            onKeyDown:handleKeyDown,
            autoFocus:true,
            style:{fontSize:12,padding:"4px 8px"}
          })
        ),
        /* Options */
        React.createElement("div",{style:{overflowY:"auto",flex:1}},
          /* Clear option */
          React.createElement("div",{
            onMouseDown:e=>{e.preventDefault();clear();},
            className:"mr",
            style:{
              padding:"7px 12px",cursor:"pointer",
              borderBottom:"1px solid var(--border2)",
              fontSize:12,color:"var(--text5)",fontStyle:"italic",
              fontFamily:"'DM Sans',sans-serif",display:"flex",alignItems:"center",gap:8
            }
          },
            React.createElement("span",{style:{width:18,height:18,borderRadius:"50%",border:"1px dashed var(--border)",display:"inline-block",flexShrink:0}}),
            "— no payee —"
          ),
          filtered.length===0&&React.createElement("div",{style:{
            padding:"12px 14px",fontSize:11,color:"var(--text5)",fontStyle:"italic",textAlign:"center"
          }},query?"No match — press Enter to add":"No payees yet"),
          filtered.map(p=>React.createElement("div",{
            key:p.id,
            onMouseDown:e=>{e.preventDefault();pick(p.name);},
            className:"mr",
            style:{
              padding:"7px 12px",cursor:"pointer",
              borderBottom:"1px solid var(--border2)",
              display:"flex",alignItems:"center",gap:8,
              fontSize:12,color:"var(--text2)",
              fontFamily:"'DM Sans',sans-serif",transition:"background .1s"
            }
          },
            React.createElement("span",{style:{
              width:20,height:20,borderRadius:"50%",
              background:"var(--accentbg)",border:"1px solid var(--border)",
              display:"inline-flex",alignItems:"center",justifyContent:"center",
              fontSize:9,fontWeight:700,color:"var(--accent)",flexShrink:0
            }},p.name.charAt(0).toUpperCase()),
            React.createElement("span",{style:{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},p.name)
          ))
        )
      )
    );
  }

  /* ── FULL mode: inline text input (used in modals / forms) ── */
  return React.createElement("div",{ref:wrapRef,style:{position:"relative"}},
    /* Input row */
    React.createElement("div",{style:{position:"relative",display:"flex",alignItems:"center"}},
      React.createElement("input",{
        className:"inp",
        placeholder,
        value:query,
        onChange:handleInput,
        onFocus:handleFocus,
        onKeyDown:handleKeyDown,
        style:{paddingRight:34}

      React.createElement("button",{
        type:"button",
        onMouseDown:e=>{e.preventDefault();setOpen(o=>!o);},
        style:{
          position:"absolute",right:0,top:0,bottom:0,
          width:34,display:"flex",alignItems:"center",justifyContent:"center",
          background:"transparent",border:"none",cursor:"pointer",
          color:"var(--text5)",fontSize:11,borderRadius:"0 8px 8px 0",
          transition:"color .15s"
        }
      },"▾")
    ),
    /* Dropdown */
    open&&React.createElement("div",{style:{
      position:"absolute",top:"calc(100% + 4px)",left:0,right:0,zIndex:2000,
      background:"var(--modal-bg)",border:"1px solid var(--border)",
      borderRadius:10,boxShadow:"0 8px 32px rgba(0,0,0,.45)",
      maxHeight:220,overflowY:"auto",
      fontFamily:"'DM Sans',sans-serif"
    }},
      filtered.length===0
        ?React.createElement("div",{style:{
            padding:"12px 14px",fontSize:12,
            color:"var(--text5)",fontStyle:"italic",textAlign:"center"
          }},"No matching payees -- press Enter to use \""+query+"\"")
        :filtered.map(p=>React.createElement("div",{
            key:p.id,
            onMouseDown:e=>{e.preventDefault();pick(p.name);},
            className:"mr",
            style:{
              padding:"10px 14px",cursor:"pointer",
              borderBottom:"1px solid var(--border2)",
              fontSize:13,color:"var(--text2)",
              transition:"background .12s",
              display:"flex",alignItems:"center",gap:10
            }
          },
          React.createElement("span",{style:{
            width:28,height:28,borderRadius:"50%",
            background:"var(--accentbg)",border:"1px solid var(--border)",
            display:"flex",alignItems:"center",justifyContent:"center",
            fontSize:11,fontWeight:700,color:"var(--accent)",flexShrink:0
          }},p.name.charAt(0).toUpperCase()),
          React.createElement("span",{style:{fontWeight:500}},p.name)
        ))
    )
  );
};

/* ── CATEGORY COMBOBOX — searchable, colour-dotted ─────────────────────── */
const CatCombobox=({value,onChange,categories,placeholder="Search categories…",compact=false})=>{
  const[open,setOpen]=useState(false);
  const[query,setQuery]=useState("");
  const wrapRef=React.useRef(null);

  /* Build flat list: [{label, value, color, isMain, mainName}] */
  const allOptions=React.useMemo(()=>{
    const opts=[];
    (categories||[]).forEach(c=>{
      opts.push({label:c.name,value:c.name,color:c.color||CAT_C[c.name]||"#8ba0c0",isMain:true,mainName:c.name});
      (c.subs||[]).forEach(sc=>{
        opts.push({label:sc.name,value:c.name+"::"+sc.name,color:c.color||CAT_C[c.name]||"#8ba0c0",isMain:false,mainName:c.name});
      });
    });
    return opts;
  },[categories]);

  /* Filter by query */
  const filtered=React.useMemo(()=>{
    if(!query.trim())return allOptions;
    const q=query.toLowerCase();
    return allOptions.filter(o=>
      o.label.toLowerCase().includes(q)||o.mainName.toLowerCase().includes(q)
    );
  },[query,allOptions]);

  /* Close on outside click */
  React.useEffect(()=>{
    if(!open)return;
    const handler=e=>{if(wrapRef.current&&!wrapRef.current.contains(e.target))setOpen(false);};

    return()=>document.removeEventListener("mousedown",handler);

    },

        ?React.createElement("span",{style:{width:compact?8:10,height:compact?8:10,borderRadius:"50%",background:displayColor,flexShrink:0,display:"inline-block"}})
        :React.createElement("span",{style:{width:compact?8:10,height:compact?8:10,borderRadius:"50%",border:"1px dashed var(--border)",flexShrink:0,display:"inline-block"}}),
      React.createElement("span",{style:{
        flex:1,fontSize:compact?11:14,
        color:value?(compact?displayColor:"var(--text)"):"var(--text5)",
        fontWeight:value?500:400,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",
        fontFamily:"'DM Sans',sans-serif"
      }},displayLabel||placeholder),
      React.createElement("span",{style:{fontSize:compact?9:11,color:"var(--text5)",flexShrink:0}},open?"▲":"▼")
    ),
    /* Dropdown */
    open&&React.createElement("div",{
      onClick:e=>e.stopPropagation(),
      style:{
        position:"absolute",top:"calc(100% + 3px)",left:0,right:0,zIndex:3000,
        background:"var(--modal-bg)",border:"1px solid var(--border)",
        borderRadius:10,boxShadow:"0 8px 28px rgba(0,0,0,.5)",

        maxHeight:260,minWidth:200

/* ── DASHBOARD ──────────────────────────────────────────────────────────── */
const Dashboard=({data,isMobile})=>{
  const[ready,setReady]=useState(false);

  React.useEffect(()=>{const t=setTimeout(()=>setReady(true),100);return()=>clearTimeout(t);},[]);

  /* ━━ 1. BANKING CORE METRICS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  const MNAMES=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const bTotal   = data.banks.reduce((s,b)=>s+b.balance,0);
  const cashBal  = data.cash.balance;
  const cDebt    = data.cards.reduce((s,c)=>s+c.outstanding,0);
  const cLimit   = data.cards.reduce((s,c)=>s+c.limit,0);
  const netLiquid= bTotal+cashBal-cDebt;
  const todayStr = TODAY();
  const thisMonth= todayStr.substr(0,7);

  /* ━━ 2. ALL BANKING TRANSACTIONS (banks + cards + cash) ━━━ */
  const allBankTx=[
    ...data.banks.flatMap(b=>b.transactions.map(t=>({...t,_bid:b.id,_src:b.name,_srcType:"bank",_col:"#06b6d4"}))),
    ...data.cards.flatMap(c=>c.transactions.map(t=>({...t,_bid:c.id,_src:c.name,_srcType:"card",_col:"#fb923c"}))),
    ...data.cash.transactions.map(t=>({...t,_bid:"cash",_src:"Cash",_srcType:"cash",_col:"var(--accent)"})),
  ];

  /* ━━ 3. MONTHLY CASH FLOW — bank txs only (no cards/cash) ━ */
  const bankOnlyTx=data.banks.flatMap(b=>b.transactions);
  const flowMap={};
  bankOnlyTx.forEach(t=>{
    const ct=catClassType(data.categories,t.cat||"Others");
    if(ct==="Transfer")return;
    const k=t.date.substr(0,7);
    if(!flowMap[k])flowMap[k]={inc:0,exp:0};
    if(ct==="Income"||t.type==="credit")flowMap[k].inc+=t.amount;
    else flowMap[k].exp+=t.amount;
  });
  const monthlyFlow=Object.entries(flowMap).sort().slice(-6).map(([k,v])=>({
    key:k,label:MNAMES[+k.slice(5)-1]+" '"+k.slice(2,4),inc:v.inc,exp:v.exp
  }));

  /* ━━ 4. THIS MONTH from ALL banking sources ━━━━━━━━━━━━━━ */
  const allFlowMap={};
  allBankTx.forEach(t=>{
    const ct=catClassType(data.categories,t.cat||"Others");
    if(ct==="Transfer")return;
    const k=t.date.substr(0,7);
    if(!allFlowMap[k])allFlowMap[k]={inc:0,exp:0};
    if(ct==="Income"||t.type==="credit")allFlowMap[k].inc+=t.amount;
    else allFlowMap[k].exp+=t.amount;
  });
  const curMD    = allFlowMap[thisMonth]||{inc:0,exp:0};
  const smKeys   = Object.keys(allFlowMap).sort();
  const prevKey  = smKeys.length>=2?smKeys[smKeys.length-2]:null;
  const prevMD   = prevKey&&prevKey!==thisMonth?allFlowMap[prevKey]:null;
  const savingsRate = curMD.inc>0?Math.max(0,Math.min(100,((curMD.inc-curMD.exp)/curMD.inc)*100)):0;
  const incDelta = prevMD?curMD.inc-prevMD.inc:null;
  const expDelta = prevMD?curMD.exp-prevMD.exp:null;

  /* ━━ 6. TOP PAYEES this month — all banking tx ━━━━━━━━━━━ */

  allBankTx.filter(t=>t.date.substr(0,7)===thisMonth&&t.type==="debit"&&t.payee).forEach(t=>{
    payeeSpend[t.payee]=(payeeSpend[t.payee]||0)+t.amount;

  const topPayees=Object.entries(payeeSpend).sort((a,b)=>b[1]-a[1]).slice(0,6);

  /* ━━ 7. RECENT TRANSACTIONS feed ━━━━━━━━━━━━━━━━━━━━━━━━━ */

const InvestDashboard=({mf,shares,fd,re=[],dispatch,isMobile})=>{
  /* ── Refresh state ── */
  const[refreshing,setRefreshing]=useState(false);
  const[refreshStatus,setRefreshStatus]=useState(null); /* {ok,msg,ts,navOk,sharesOk} */

  /* ── Totals — derived live from props so re-renders automatically after dispatch ── */
  const mfVal   = mf.reduce((s,m)=>s+(m.currentValue||m.invested),0);
  const mfCost  = mf.reduce((s,m)=>s+(m.avgNav&&m.avgNav>0?m.units*m.avgNav:m.invested),0);
  const mfInv   = mf.reduce((s,m)=>s+m.invested,0);
  const shVal   = shares.reduce((s,sh)=>s+sh.qty*sh.currentPrice,0);
  const shCost  = shares.reduce((s,sh)=>s+sh.qty*sh.buyPrice,0);
  const fdPrinc = fd.reduce((s,f)=>s+f.amount,0);
  const fdMat   = fd.reduce((s,f)=>{
    const m=f.maturityAmount&&f.maturityAmount>f.amount?f.maturityAmount:calcFDMaturity(f.amount,f.rate,f.startDate,f.maturityDate);
    return s+m;
  },0);
  const reCost  = re.reduce((s,r)=>s+r.acquisitionCost,0);
  const reVal   = re.reduce((s,r)=>s+(r.currentValue||r.acquisitionCost),0);
  const totalInvested = mfCost+shCost+fdPrinc+reCost;
  const totalCurrent  = mfVal+shVal+fdPrinc+reVal;
  const totalPnL      = totalCurrent-totalInvested;
  const pnlPct        = totalInvested>0?((totalPnL/totalInvested)*100):0;

  /* ── Allocation donut ── */
  const allocData=[
    {name:"Mutual Funds",  value:mfVal,   col:"#a78bfa"},
    {name:"Shares",        value:shVal,   col:"#22c55e"},
    {name:"Fixed Deposits",value:fdPrinc, col:"#f0a500"},
    {name:"Real Estate",   value:reVal,   col:"#fb923c"},
  ].filter(a=>a.val!==0||a.value>0);
  const allocTotal=allocData.reduce((s,a)=>s+a.value,0);

  /* ── Top gainers/losers from shares ── */
  const shPnl=shares.map(sh=>{
    const inv=sh.qty*sh.buyPrice, cur=sh.qty*sh.currentPrice, pnl=cur-inv;
    return{...sh,pnl,pnlPct:inv>0?(pnl/inv)*100:0};
  }).sort((a,b)=>b.pnlPct-a.pnlPct);
  const gainers=shPnl.filter(s=>s.pnl>=0).slice(0,3);
  const losers=[...shPnl].reverse().filter(s=>s.pnl<0).slice(0,3);

  /* ── FD maturing soon (within 90 days) ── */
  const fdSoon=fd.filter(f=>daysLeft(f.maturityDate)<=90&&daysLeft(f.maturityDate)>=0)
                 .sort((a,b)=>daysLeft(a.maturityDate)-daysLeft(b.maturityDate));

  /* ── MF top performers by % return ── */
  const mfPerf=mf.map(m=>{
    const cost=m.avgNav&&m.avgNav>0?m.units*m.avgNav:m.invested;
    const cur=m.currentValue||m.invested;
    const pnl=cur-cost;
    return{...m,pnl,pnlPct:cost>0?(pnl/cost)*100:0};
  }).sort((a,b)=>b.pnlPct-a.pnlPct);

  /* ── Unified refresh: MF NAV + Share prices in parallel ────────────────
     Share price sources (tried in order per ticker):
       1. Stooq   — direct CORS-friendly CSV endpoint (.IN suffix for NSE)
       2. Yahoo Finance v8 via corsproxy.io
       3. Yahoo Finance v8 via allorigins.win
       4. Yahoo Finance v7 quote endpoint via proxy
  ──────────────────────────────────────────────────────────────────────── */
  const refreshAll=async()=>{
    setRefreshing(true);
    setRefreshStatus(null);
    const pos=v=>{const n=parseFloat(v);return n>0?Math.round(n*100)/100:null;};

    /* ── NAV fetch (mfapi.in) ── */
    const navPromise=(async()=>{
      if(!mf.length)return{ok:true,updated:0};
      try{
        const upd=await Promise.all(mf.map(async m=>{
          try{
            const r=await fetch("https://api.mfapi.in/mf/"+m.schemeCode);
            const d=await r.json();
            const nav=parseFloat(d.data[0].nav);
            return{...m,nav,navDate:d.data[0].date,currentValue:nav*m.units};
          }catch{return m;}
        }));
        dispatch({type:"UPD_MF_NAV",p:upd});
        const updated=upd.filter(m=>m.nav>0).length;
        return{ok:updated>0,updated};
      }catch{return{ok:false,updated:0};}
    })();

    /* ── Share price fetch — multi-source fallback ── */
    const sharesPromise=(async()=>{
      if(!shares.length)return{ok:true,updated:0,failed:0};
      let updated=0,failed=0;

      const tryStooq=async(ticker)=>{
        const sym=ticker.toLowerCase()+".in";
        try{
          const r=await fetch("https://stooq.com/q/l/?s="+encodeURIComponent(sym)+"&f=sd2t2ohlcv&h&e=csv",{mode:"cors"});
          if(!r.ok)return null;
          const txt=await r.text();
          const lines=txt.trim().split("\n");
          if(lines.length<2)return null;
          return pos(lines[1].split(",")[6]);
        }catch{return null;}
      };

      const tryYahooViaProxy=async(ticker)=>{
        const yUrl=sym=>"https://query1.finance.yahoo.com/v8/finance/chart/"+encodeURIComponent(sym)+"?interval=1d&range=5d";
        const proxies=[
          u=>"https://corsproxy.io/?"+encodeURIComponent(u),
          u=>"https://api.allorigins.win/raw?url="+encodeURIComponent(u),
          u=>"https://thingproxy.freeboard.io/fetch/"+u,
        ];
        for(const makeProxy of proxies){
          for(const sym of[ticker+".NS",ticker+".BO",ticker]){
            try{
              const r=await fetch(makeProxy(yUrl(sym)),{mode:"cors"});
              if(!r.ok)continue;
              const txt=await r.text();
              let json;try{json=JSON.parse(txt);}catch{continue;}
              const payload=json?.contents?JSON.parse(json.contents):json;
              const meta=payload?.chart?.result?.[0]?.meta;
              const price=pos(meta?.regularMarketPrice)||pos(meta?.previousClose);
              if(price)return price;
            }catch{}
          }
        }
        return null;
      };

      const tryYahooQuote=async(ticker)=>{
        const syms=[ticker+".NS",ticker+".BO"].join(",");
        const url="https://query1.finance.yahoo.com/v7/finance/quote?symbols="+encodeURIComponent(syms)+"&fields=regularMarketPrice,previousClose";
        for(const proxy of[
          "https://corsproxy.io/?"+encodeURIComponent(url),
          "https://api.allorigins.win/raw?url="+encodeURIComponent(url),
        ]){
          try{
            const r=await fetch(proxy,{mode:"cors"});
            if(!r.ok)continue;
            const txt=await r.text();
            let json;try{json=JSON.parse(txt);}catch{continue;}
            const payload=json?.contents?JSON.parse(json.contents):json;
            const results=payload?.quoteResponse?.result||[];
            for(const q of results){
              const price=pos(q?.regularMarketPrice)||pos(q?.previousClose);
              if(price)return price;
            }
          }catch{}
        }
        return null;
      };

      for(const sh of shares){
        const ticker=(sh.ticker||"").trim().toUpperCase();
        if(!ticker){failed++;continue;}
        const price=await tryStooq(ticker)||await tryYahooViaProxy(ticker)||await tryYahooQuote(ticker);
        if(price){
          dispatch({type:"EDIT_SHARE",p:{...sh,currentPrice:price,priceTs:new Date().toISOString(),priceStale:false}});
          updated++;
        }else{
          dispatch({type:"EDIT_SHARE",p:{...sh,priceStale:true}});
          failed++;
        }
      }
      return{ok:updated>0,updated,failed};
    })();

    /* ── Await both in parallel ── */
    const[navRes,shrRes]=await Promise.all([navPromise,sharesPromise]);
    const ts=new Date();
    const parts=[];
    if(mf.length)  parts.push(navRes.ok  ? `✓ ${navRes.updated} NAV${navRes.updated!==1?"s":""} updated`        : "✗ NAV fetch failed");
    if(shares.length) parts.push(shrRes.ok ? `✓ ${shrRes.updated} price${shrRes.updated!==1?"s":""} updated`+(shrRes.failed>0?` (${shrRes.failed} failed)`:"") : "✗ Share price fetch failed");
    const allOk=(!mf.length||navRes.ok)&&(!shares.length||shrRes.ok);
    setRefreshStatus({ok:allOk,msg:parts.join("  ·  ")||"Nothing to refresh",ts});
    setRefreshing(false);
  };

  /* ── small section header ── */
  const SecHead=({title,color})=>React.createElement("div",{style:{
    fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:.8,
    color:color||"var(--text5)",marginBottom:10,paddingBottom:6,
    borderBottom:"1px solid var(--border2)"
  }},title);

  return React.createElement("div",{className:"fu"},
    /* ── Page title */
    React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:refreshStatus?10:20,flexWrap:"wrap",gap:10}},
      React.createElement("div",null,
        React.createElement("h2",{style:{fontFamily:"'Sora',sans-serif",fontSize:22,fontWeight:700,color:"var(--text)"}},"Investment Dashboard"),
        React.createElement("p",{style:{color:"var(--text5)",fontSize:13,marginTop:4}},"Portfolio overview · "+new Date().toLocaleDateString("en-IN",{day:"numeric",month:"long",year:"numeric"}))
      ),
      React.createElement(Btn,{v:"success",sz:"sm",onClick:refreshAll,disabled:refreshing},
        refreshing
          ? React.createElement(React.Fragment,null,React.createElement("span",{className:"spinr"},"⟳")," Refreshing…")
          : "⟳ Refresh Live Prices"
      )
    ),
    /* ── Refresh status banner ── */
    refreshStatus&&React.createElement("div",{style:{
      display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",
      marginBottom:16,padding:"9px 14px",borderRadius:9,
      background:refreshStatus.ok?"rgba(34,197,94,.07)":"rgba(239,68,68,.07)",
      border:"1px solid "+(refreshStatus.ok?"rgba(34,197,94,.25)":"rgba(239,68,68,.25)"),
    }},
      React.createElement("span",{style:{fontSize:14}},(refreshStatus.ok?"✓":"⚠")),
      React.createElement("span",{style:{fontSize:12,color:refreshStatus.ok?"#22c55e":"#ef4444",fontWeight:500,flex:1}},refreshStatus.msg),
      React.createElement("span",{style:{fontSize:11,color:"var(--text5)",whiteSpace:"nowrap"}},
        refreshStatus.ts.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit",second:"2-digit"})

      React.createElement("button",{

        style:{background:"none",border:"none",cursor:"pointer",color:"var(--text5)",fontSize:14,lineHeight:1,padding:"0 2px"}
      },"×")
    ),

    /* ── Hero card */
    React.createElement(Card,{sx:{marginBottom:16,background:"var(--card2)",position:"relative",overflow:"hidden"}},
      React.createElement("div",{style:{position:"absolute",right:-30,top:-30,width:160,height:160,borderRadius:"50%",background:"var(--accentbg2)"}}),
      React.createElement("div",{style:{display:"flex",gap:40,flexWrap:"wrap",alignItems:"flex-end"}},
        React.createElement("div",null,
          React.createElement("div",{style:{fontSize:11,color:"var(--text5)",textTransform:"uppercase",letterSpacing:1.2,marginBottom:6}},"Total Portfolio Value"),
          React.createElement("div",{style:{fontSize:36,fontFamily:"'Sora',sans-serif",fontWeight:800,color:"var(--accent)"}},INR(totalCurrent)),
          React.createElement("div",{style:{display:"flex",gap:6,alignItems:"center",marginTop:8,flexWrap:"wrap"}},
            React.createElement("span",{style:{

              background:totalPnL>=0?"rgba(34,197,94,.12)":"rgba(239,68,68,.12)",
              color:totalPnL>=0?"#22c55e":"#ef4444",border:"1px solid "+(totalPnL>=0?"rgba(34,197,94,.3)":"rgba(239,68,68,.3)")
            }},(totalPnL>=0?"▲ ":"▼ ")+INR(Math.abs(totalPnL))+" ("+Math.abs(pnlPct).toFixed(2)+"%)"),
            React.createElement("span",{style:{fontSize:11,color:"var(--text5)"}},"vs cost of acquisition")
          )
        ),
        React.createElement("div",{style:{display:"flex",gap:24,flexWrap:"wrap"}},

  const[open,setOpen]=useState(false);
  const[q,setQ]=useState("");
  const btnRef=React.useRef(null);
  const[pos,setPos]=useState({top:0,left:0,width:200});

  /* Click-outside closes the dropdown */
  React.useEffect(()=>{
    if(!open)return;
    const handler=e=>{
      /* Close unless the click is inside the fixed dropdown portal div */
      const portal=document.getElementById("ipp-portal");
      if(portal&&portal.contains(e.target))return;
      if(btnRef.current&&btnRef.current.contains(e.target))return;
      setOpen(false);

    document.addEventListener("mousedown",handler);

        },q?"No payees match \""+q+"\"":(payees||[]).length===0?"No payees yet — add some in Settings → Payees":"No payees"),

        },
          React.createElement("span",{style:{
            width:22,height:22,borderRadius:"50%",background:"var(--accentbg3,rgba(240,165,0,.15))",

/* Helper: build category×month heatmap rows from a tx array */
const buildHeatRows=(allTx,months,categories,filterFn)=>{
  const grid={};
  (filterFn?allTx.filter(filterFn):allTx).forEach(t=>{
    const main=catMainName(t.cat||"Others");
    const m=t.date.substr(0,7);
    if(!grid[main])grid[main]={};
    grid[main][m]=(grid[main][m]||0)+t.amount;
  });
  return Object.keys(grid).sort().map(cat=>{
    const catObj=categories.find(c=>c.name===cat);
    return{label:cat,col:catObj?.color||CAT_C[cat]||"#8ba0c0",data:grid[cat]||{}};
  });
};

/* ── Shared tx collector ──────────────────────────────────────────────────── */
const collectTx=(data,from,to,accFilter="all")=>{
  let rows=[];
  data.banks.forEach(b=>{
    if(accFilter!=="all"&&accFilter!==b.id)return;
    b.transactions.forEach(t=>{if(t.date>=from&&t.date<=to)rows.push({...t,accName:b.name,accId:b.id,accType:"bank"});});
  });
  data.cards.forEach(c=>{
    if(accFilter!=="all"&&accFilter!==c.id)return;
    c.transactions.forEach(t=>{if(t.date>=from&&t.date<=to)rows.push({...t,accName:c.name,accId:c.id,accType:"card"});});
  });
  if(accFilter==="all"||accFilter==="__cash__"){
    data.cash.transactions.forEach(t=>{if(t.date>=from&&t.date<=to)rows.push({...t,accName:"Cash",accId:"__cash__",accType:"cash"});});
  }
  return rows;
};

    opts.map(o=>React.createElement("option",{key:o.id,value:o.id},o.label))

};

/* ── Compact per-category SVG bar chart ── */

      return React.createElement("g",{key:r.name},
        React.createElement("text",{x:0,y:y+bH*.75,fill:"var(--text4)",fontSize:9,fontFamily:"'DM Sans',sans-serif"},r.name.length>11?r.name.slice(0,11)+"…":r.name),
        React.createElement("rect",{x:labelW,y,width:bW,height:bH,rx:2,fill:r.col||color,opacity:.85}),

/* ── Custom donut with per-slice colour ── */
const CatDonut=({data,size=140})=>{
  const total=data.reduce((s,d)=>s+d.value,0);
  if(!total)return React.createElement("div",{style:{textAlign:"center",color:"var(--text6)",padding:20,fontSize:12}},"No data");
  let angle=-90;
  const cx=size/2,cy=size/2,r=size*.38,ir=size*.22;
  const slices=data.map((d,i)=>{
    const sweep=(d.value/total)*360;
    const a1=angle*(Math.PI/180),a2=(angle+sweep)*(Math.PI/180);
    const x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1);
    const x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
    const xi1=cx+ir*Math.cos(a1),yi1=cy+ir*Math.sin(a1);
    const xi2=cx+ir*Math.cos(a2),yi2=cy+ir*Math.sin(a2);
    const lg=sweep>180?1:0;

    if(ct==="Income")monthly[k].inc+=t.amount;
    else if(ct==="Investment")monthly[k].inv+=t.amount;
    else if(ct==="Expense"||t.type==="debit")monthly[k].exp+=t.amount;

/* ══════════════════════════════════════════════════════════════════════════
   EXPORT REPORT MODAL — Monthly / Yearly summary export to Excel + PDF
   ══════════════════════════════════════════════════════════════════════════ */
const ExportReportModal=({data,onClose})=>{
  const[periodType,setPeriodType]=useState("monthly"); /* monthly | yearly */
  const[selMonth,setSelMonth]=useState(()=>new Date().toISOString().substr(0,7));
  const[selYear,setSelYear]=useState(()=>String(new Date().getFullYear()));
  const[exporting,setExporting]=useState(false);
  const[status,setStatus]=useState(null);

  /* ── derive date range from selection ── */
  const getRange=()=>{
    if(periodType==="monthly"){
      const[y,m]=selMonth.split("-").map(Number);
      const last=new Date(y,m,0).getDate();
      return{from:`${selMonth}-01`,to:`${selMonth}-${String(last).padStart(2,"0")}`,label:new Date(y,m-1,1).toLocaleDateString("en-IN",{month:"long",year:"numeric"})};
    }else{
      return{from:`${selYear}-01-01`,to:`${selYear}-12-31`,label:`Financial Year ${selYear}`};
    }
  };

  /* ── collect all transactions in range ── */
  const getTx=(from,to)=>{
    const inRange=t=>t.date>=from&&t.date<=to;
    const banks=data.banks.flatMap(b=>b.transactions.filter(inRange).map(t=>({...t,accName:b.name,accBank:b.bank,accType:"Bank"})));
    const cards=data.cards.flatMap(c=>c.transactions.filter(inRange).map(t=>({...t,accName:c.name,accBank:c.bank,accType:"Card"})));
    const cash=data.cash.transactions.filter(inRange).map(t=>({...t,accName:"Cash Wallet",accBank:"",accType:"Cash"}));
    return{banks,cards,cash,all:[...banks,...cards,...cash]};
  };

  /* ── category aggregation ── */
  const getCatSummary=(txns)=>{
    const map={};
    txns.forEach(t=>{
      const main=catMainName(t.cat||"Others");
      const sub=t.cat&&t.cat.includes("::")?t.cat.split("::")[1]:"";
      const ct=catClassType(data.categories,t.cat||"Others");
      const key=main+(sub?"::"+sub:"");
      if(!map[key])map[key]={category:main,subCategory:sub,classType:ct,debit:0,credit:0,count:0};
      if(t.type==="debit")map[key].debit+=t.amount;
      else map[key].credit+=t.amount;
      map[key].count++;
    });
    return Object.values(map).sort((a,b)=>b.debit-a.debit);
  };

  /* ── monthly cash flow aggregation ── */
  const getMonthlyCF=(txns,from,to)=>{
    const months={};
    txns.forEach(t=>{
      const m=t.date.substr(0,7);
      if(!months[m])months[m]={month:m,income:0,expense:0,investment:0,transfer:0};
      const ct=catClassType(data.categories,t.cat||"Others");
      if(ct==="Income")months[m].income+=t.amount;
      else if(ct==="Expense"||ct==="Others")months[m].expense+=t.amount;
      else if(ct==="Investment")months[m].investment+=t.amount;
      else months[m].transfer+=t.amount;
    });
    return Object.values(months).sort((a,b)=>a.month.localeCompare(b.month)).map(m=>({
      ...m,
      net:m.income-m.expense-m.investment,
      label:MONTH_NAMES[parseInt(m.month.slice(5))-1]+" "+m.month.slice(0,4)
    }));
  };

  /* ══════════════════════════════════════════════════
     EXCEL EXPORT — multi-sheet workbook via SheetJS
  ══════════════════════════════════════════════════ */
  const exportExcel=()=>{
    setExporting(true);setStatus(null);
    try{
      const{from,to,label}=getRange();
      const{banks,cards,cash,all}=getTx(from,to);
      const catRows=getCatSummary(all);
      const cfRows=getMonthlyCF(all,from,to);
      const WB=XLSX.utils.book_new();
      const addSheet=(name,rows)=>XLSX.utils.book_append_sheet(WB,XLSX.utils.aoa_to_sheet(rows),name);
      const fmt=n=>typeof n==="number"?n:0;
      const hStyle={font:{bold:true}};

      /* ── Sheet 1: Cover & Net Worth Snapshot ── */
      const bankBal=data.banks.reduce((s,b)=>s+b.balance,0);
      const cashBal=data.cash.balance;
      const shVal=data.shares.reduce((s,sh)=>s+sh.qty*sh.currentPrice,0);
      const mfVal=data.mf.reduce((s,m)=>s+(m.currentValue||m.invested),0);
      const fdVal=data.fd.reduce((s,f)=>s+f.amount,0);
      const reVal=data.re.reduce((s,r)=>s+(r.currentValue||r.acquisitionCost),0);
      const cDebt=data.cards.reduce((s,c)=>s+c.outstanding,0);
      const lDebt=data.loans.reduce((s,l)=>s+l.outstanding,0);
      const totalAssets=bankBal+cashBal+shVal+mfVal+fdVal+reVal;
      const netWorth=totalAssets-cDebt-lDebt;
      const totIncome=all.filter(t=>catClassType(data.categories,t.cat||"Others")==="Income").reduce((s,t)=>s+t.amount,0);
      const totExpense=all.filter(t=>["Expense","Others"].includes(catClassType(data.categories,t.cat||"Others"))).reduce((s,t)=>s+t.amount,0);
      const totInvest=all.filter(t=>catClassType(data.categories,t.cat||"Others")==="Investment").reduce((s,t)=>s+t.amount,0);
      const netFlow=totIncome-totExpense-totInvest;
      const savRate=totIncome>0?((netFlow/totIncome)*100).toFixed(1)+"%" :"--";
      addSheet("Summary",[
        ["Money Manager — Export Report","","",""],
        ["Generated",new Date().toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"}),"",""],
        ["Period",label,"",""],
        ["Date Range",from+" to "+to,"",""],
        ["","","",""],
        ["━━ PERIOD CASH FLOW SNAPSHOT","","",""],
        ["Total Income","",fmt(totIncome),""],
        ["Total Expenses","",fmt(totExpense),""],
        ["Investments Made","",fmt(totInvest),""],
        ["Net Savings","",fmt(netFlow),""],
        ["Savings Rate","",savRate,""],
        ["Total Transactions","",all.length,""],
        ["","","",""],
        ["━━ NET WORTH SNAPSHOT (Current)","","",""],
        ["ASSETS","","",""],
        ["Bank Accounts","",fmt(bankBal),""],
        ["Cash Wallet","",fmt(cashBal),""],
        ["Mutual Funds","",fmt(mfVal),""],
        ["Shares / Equities","",fmt(shVal),""],

const CalculatorSection=()=>{
  const[expr,setExpr]=useState("");      /* full expression string */
  const[display,setDisplay]=useState("0");/* current display value */
  const[result,setResult]=useState(null); /* last computed result */
  const[fresh,setFresh]=useState(false);  /* true right after = so next digit starts fresh */
  const[history,setHistory]=useState([]); /* [{expr,ans}] */

  /* Format number nicely — no unnecessary decimals, commas for readability */
  const fmt=v=>{
    if(v===null||v===undefined||v==="")return"0";
    const n=Number(v);
    if(!isFinite(n))return String(v);
    /* Up to 10 significant digits, strip trailing zeros */
    const s=parseFloat(n.toPrecision(10)).toString();
    /* Add thousands separator to integer part */
    const[int,dec]=s.split(".");
    const intFmt=int.replace(/\B(?=(\d{3})+(?!\d))/g,",");
    return dec!==undefined?intFmt+"."+dec:intFmt;
  };

  const safeEval=str=>{
    /* Replace × ÷ with JS operators, then eval safely */
    const cleaned=str.replace(/×/g,"*").replace(/÷/g,"/");
    /* Only allow digits, operators, dot, parens, spaces */
    if(!/^[0-9+\-*/().\s]+$/.test(cleaned))throw new Error("invalid");
    /* eslint-disable-next-line no-new-func */
    return Function('"use strict";return ('+cleaned+')')();
  };

  const pressDigit=d=>{
    if(fresh){setExpr(d);setDisplay(d);setFresh(false);return;}
    const ne=expr===(""+result)?d:(expr+d);
    setExpr(ne);setDisplay(d);setResult(null);
  };

  const pressOp=op=>{
    setFresh(false);
    /* Compute partial result if previous expr is complete */
    let base=expr;
    if(base===""||base===undefined)base="0";
    /* Replace trailing operator */
    const trimmed=base.replace(/[+\-×÷]$/,"");
    setExpr(trimmed+op);
    setDisplay(op);
    setResult(null);
  };

  const pressDot=()=>{
    if(fresh){setExpr("0.");setDisplay("0.");setFresh(false);return;}
    /* Don't add dot if current segment already has one */
    const segs=expr.split(/[+\-×÷]/);
    const cur=segs[segs.length-1];
    if(cur.includes("."))return;
    const ne=expr+".";
    setExpr(ne);setDisplay(ne);
  };

  const pressEquals=()=>{
    if(!expr)return;
    try{
      const ans=safeEval(expr);
      if(!isFinite(ans))throw new Error("div0");
      const fmtAns=parseFloat(ans.toPrecision(10));
      setHistory(h=>[{expr,ans:fmtAns},...h].slice(0,20));
      setDisplay(String(fmtAns));
      setExpr(String(fmtAns));
      setResult(fmtAns);
      setFresh(true);
    }catch{
      setDisplay("Error");setExpr("");setResult(null);setFresh(true);
    }
  };

  const pressClear=()=>{setExpr("");setDisplay("0");setResult(null);setFresh(false);};
  const pressBack=()=>{
    if(fresh||!expr){pressClear();return;}
    const ne=expr.slice(0,-1);
    setExpr(ne);setDisplay(ne||"0");
  };

  const pressPercent=()=>{
    if(!expr)return;
    try{const v=safeEval(expr)/100;setExpr(String(v));setDisplay(String(v));}catch{}
  };

  /* Keyboard support */
  React.useEffect(()=>{
    const h=e=>{
      if("0123456789".includes(e.key))pressDigit(e.key);
      else if(e.key===".")pressDot();
      else if(e.key==="+"||e.key==="-")pressOp(e.key==="+"?"+":"−");
      else if(e.key==="*")pressOp("×");
      else if(e.key==="/"){e.preventDefault();pressOp("÷");}
      else if(e.key==="Enter"||e.key==="=")pressEquals();
      else if(e.key==="Backspace")pressBack();
      else if(e.key==="Escape")pressClear();
    };
    window.addEventListener("keydown",h);
    return()=>window.removeEventListener("keydown",h);
  });

  /* Button config: [label, action, style-class] */
  const BTNS=[
    ["C",  pressClear,  "fn"],   ["⌫", pressBack,   "fn"],  ["%",pressPercent,"fn"],  ["÷",()=>pressOp("÷"),"op"],
    ["7",  ()=>pressDigit("7"),"num"],["8",()=>pressDigit("8"),"num"],["9",()=>pressDigit("9"),"num"],["×",()=>pressOp("×"),"op"],
    ["4",  ()=>pressDigit("4"),"num"],["5",()=>pressDigit("5"),"num"],["6",()=>pressDigit("6"),"num"],["−",()=>pressOp("−"),"op"],
    ["1",  ()=>pressDigit("1"),"num"],["2",()=>pressDigit("2"),"num"],["3",()=>pressDigit("3"),"num"],["+",()=>pressOp("+"),"op"],
    ["00", ()=>{pressDigit("0");pressDigit("0");},"num"],
              ["0",()=>pressDigit("0"),"num"],[".",pressDot,"num"],["=",pressEquals,"eq"],
  ];

  return React.createElement("div",{className:"fu",style:{display:"flex",gap:18,alignItems:"flex-start",flexWrap:"wrap"}},

    /* ── Calculator body ── */
    React.createElement("div",{style:{
      background:"var(--card)",border:"1px solid var(--border)",borderRadius:20,

    }},

      /* Display */
      React.createElement("div",{style:{
        background:"var(--bg3)",padding:"20px 22px 14px",
        borderBottom:"1px solid var(--border2)",minHeight:104,
        display:"flex",flexDirection:"column",justifyContent:"flex-end",alignItems:"flex-end",gap:6
      }},
        /* Expression strip */
        React.createElement("div",{style:{
          fontSize:12,color:"var(--text5)",fontFamily:"'Sora',monospace",

          textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:260,

        /* Main display value */
        React.createElement("div",{style:{
          fontSize:display.length>12?22:display.length>8?28:34,
          fontFamily:"'Sora',sans-serif",fontWeight:700,
          color:display==="Error"?"#ef4444":"var(--accent)",
          lineHeight:1.1,letterSpacing:"-0.5px",
          textAlign:"right",wordBreak:"break-all"
        }},display==="Error"?"Error":fmt(isNaN(Number(display.replace(/,/g,"")))?display:display))
      ),

/* ── LOCALSTORAGE PERSISTENCE ─────────────────────────────────────────────── */
const LS_KEY="mm_v7_state";
const LS_THEME="mm_v7_theme";

const loadState=()=>{
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(!raw)return null;
    const parsed=JSON.parse(raw);
    // Merge with EMPTY_STATE (not INIT) to pick up new fields without bleeding in sample data
    const def=EMPTY_STATE();
    return {
      ...def,...parsed,
      banks:(parsed.banks||def.banks),
      cards:(parsed.cards||def.cards),
      cash:(parsed.cash||def.cash),
      mf:(parsed.mf||def.mf),
      shares:(parsed.shares||def.shares),
      fd:(parsed.fd||def.fd),
      loans:(parsed.loans||def.loans),
      categories:(parsed.categories||def.categories).map(c=>({classType:"Expense",...c})),
      payees:(parsed.payees||def.payees),
      scheduled:(parsed.scheduled||def.scheduled||[]),
      re:(parsed.re||def.re||[]),
      notes:(parsed.notes||def.notes||[]),
    };
  }catch(e){console.warn("Failed to load state:",e);return null;}
};

const saveState=(s)=>{
  try{localStorage.setItem(LS_KEY,JSON.stringify(s));}
  catch(e){console.warn("Failed to save state:",e);}
};

const loadTheme=()=>{
  try{return localStorage.getItem(LS_THEME)||"ocean";}catch{return "ocean";}
};

const saveTheme=(id)=>{
  try{localStorage.setItem(LS_THEME,id);}catch{}
};

/* ── HASH ROUTING ─────────────────────────────────────────────────────────── */
const VALID_TABS=["dashboard","banks","cards","cash","inv_dash","inv_mf","inv_shares","inv_fd","inv_re","loans","scheduled","notes","calculator","reports","settings"];

const getTabFromHash=()=>{
  const h=window.location.hash.replace("#/","").replace("#","").toLowerCase();
  if(h==="investments")return"inv_mf";
  return VALID_TABS.includes(h)?h:"dashboard";
};

const setHash=(tab)=>{
  window.history.pushState(null,null,"#/"+tab);
};

const useRouting=()=>{
  const[tab,setTabState]=useState(getTabFromHash);
  const setTab=(id)=>{setTabState(id);setHash(id);};
  React.useEffect(()=>{
    const onPop=()=>setTabState(getTabFromHash());
    window.addEventListener("popstate",onPop);
    return()=>window.removeEventListener("popstate",onPop);
  },[]);
  return[tab,setTab];
};

/* ── PERSISTING REDUCER WRAPPER ───────────────────────────────────────────── */
const usePersistentReducer=(reducer,init)=>{
  const[state,rawDispatch]=useReducer(reducer,null,()=>loadState()||init());
  const dispatch=React.useCallback((action)=>{rawDispatch(action);},[]);
  // Save to localStorage whenever state changes (debounced)
  const timerRef=React.useRef(null);
  React.useEffect(()=>{
    if(timerRef.current)clearTimeout(timerRef.current);
    timerRef.current=setTimeout(()=>saveState(state),400);
    return()=>{if(timerRef.current)clearTimeout(timerRef.current);};
  },[state]);
  return[state,dispatch];
};

/* ══════════════════════════════════════════════════════════════════════════
