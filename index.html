<!-- Service Worker registration + auto-update detection -->
<script>
/* ══════════════════════════════════════════════════════════════════════
   ALWAYS-FRESH STRATEGY
   When online, this app must serve the latest deployed version.
   Three independent layers guarantee this:

   Layer 1 — Meta tags (above): tell the browser/proxy not to cache.
   Layer 2 — Service Worker: network-first for HTML, cache-first for CDN.
              Aggressive update checks (immediate + tab-focus + online).
   Layer 3 — Self-version fetch: independently compares the live page's
              APP_VERSION against the running version; fires update banner
              if they differ, even when the SW is absent or stale.
   ══════════════════════════════════════════════════════════════════════ */
(function(){

  /* ── LAYER 3: Self-version fetch ─────────────────────────────────────
     Runs immediately, before the SW is even registered.
     Fetches the live HTML with cache:'reload' (bypasses all caches,
     including any SW cache) and extracts the APP_VERSION string.
     If it differs from the version currently running in the page,
     dispatches mm:update-ready so the React banner appears.         */
  var _selfCheckDone = false;
  var APP_VERSION = "3.50.0";  // canonical version for self-check + UI
  window.__MM_APP_VERSION = APP_VERSION;
  function selfVersionCheck() {
    if (_selfCheckDone || !navigator.onLine) return;
    _selfCheckDone = true;
    var currentVer = (window.__MM_APP_VERSION || '');
    fetch(location.href, { cache: 'reload', method: 'GET' })
      .then(function(r){ return r.text(); })
      .then(function(html){
        var m = html.match(/APP_VERSION\s*=\s*"([^"]+)"/);
        if (m && m[1] && currentVer && m[1] !== currentVer) {
          console.log('[MM] New version detected via self-check:', m[1], '(running:', currentVer, ')');
          window.dispatchEvent(new CustomEvent('mm:update-ready'));
        }
      })
      .catch(function(){});  // offline or CORS — silently ignore
  }

  /* Run on load and again whenever the tab becomes visible or reconnects */
  window.addEventListener('load', function(){ setTimeout(selfVersionCheck, 2000); });
  document.addEventListener('visibilitychange', function(){
    if (document.visibilityState === 'visible') { _selfCheckDone = false; selfVersionCheck(); }
  });
  window.addEventListener('online', function(){ _selfCheckDone = false; selfVersionCheck(); });

  /* ── LAYER 2: Service Worker ─────────────────────────────────────── */
  if (!('serviceWorker' in navigator)) return;

  window.__swReg = null;

  window.addEventListener('load', function(){
    navigator.serviceWorker.register('./sw.js', { scope: './' })
      .then(function(reg){
        window.__swReg = reg;
        console.log('[SW] Registered, scope:', reg.scope);

        function notifyUpdateReady() {
          window.dispatchEvent(new CustomEvent('mm:update-ready'));
        }

        /* ── Case A: SW already waiting on page load ── */
        if (reg.waiting) {
          console.log('[SW] Update already waiting on load');
          notifyUpdateReady();
        }

        /* ── Case B: New SW installs while page is open ── */
        reg.addEventListener('updatefound', function(){
          var newWorker = reg.installing;
          if (!newWorker) return;
          console.log('[SW] Update found — new worker installing');
          newWorker.addEventListener('statechange', function(){
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              console.log('[SW] New version installed and waiting');
              notifyUpdateReady();
            }
          });
        });

        /* ── Case C: Immediate update check on every fresh load ──
           Unlike the old 60-min poll, this fires straight away so
           visiting the page online always pulls a fresh sw.js.    */
        function swUpdate() {
          if (navigator.onLine) reg.update().catch(function(){});
        }
        swUpdate(); // fire immediately

        /* ── Case D: Tab regains focus (user switches back to the tab) ── */
        document.addEventListener('visibilitychange', function(){
          if (document.visibilityState === 'visible') swUpdate();
        });

        /* ── Case E: Device/browser comes back online ── */
        window.addEventListener('online', swUpdate);

        /* ── Case F: Periodic heartbeat — every 10 min for long sessions ── */
        setInterval(swUpdate, 10 * 60 * 1000);

        /* Messages from SW to React */
        navigator.serviceWorker.addEventListener('message', function(e){
          if (e.data && e.data.type === 'SYNC_PRICES') {
            window.dispatchEvent(new CustomEvent('mm:sync-prices'));
          }
        });

        /* controllerchange fires after skipWaiting() activates new SW */
        navigator.serviceWorker.addEventListener('controllerchange', function(){
          console.log('[SW] Controller changed — reloading for new version');
          window.location.reload();
        });
      })
      .catch(function(err){
        console.warn('[SW] Registration failed:', err);
      });
  });
}());
</script>

<script>
/* ══════════════════════════════════════════════════════════════════════
   APP PROTECTION LAYER — Do not remove or modify
   ══════════════════════════════════════════════════════════════════════ */
(function(){
  'use strict';

  /* ── 1. IFRAME LOCK ─────────────────────────────────────────────────
     Prevents the app being embedded/re-hosted inside another page.    */
  if (window.self !== window.top) {
    document.documentElement.innerHTML = '';
    try { window.top.location = window.self.location; } catch(e) {}
    throw new Error('Embedding blocked');
  }

  /* ── 2. RIGHT-CLICK DISABLED (except in-app context menus) ─────── */
  document.addEventListener('contextmenu', function(e) {
    /* Allow right-click on ledger rows that opt-in via data-ctx attribute
       so the bulk-categorisation context menu can still fire. */
    if (e.target && e.target.closest && e.target.closest('[data-ctx="ledger"]')) return;
    e.preventDefault(); e.stopPropagation(); return false;
  }, true);

  /* ── 3. DEVTOOLS KEYBOARD SHORTCUTS BLOCKED ─────────────────────── */
  document.addEventListener('keydown', function(e) {
    var k = e.key;
    var ctrl = e.ctrlKey || e.metaKey;
    if (e.keyCode === 123) { e.preventDefault(); e.stopPropagation(); return false; } // F12
    if (ctrl && e.shiftKey && 'IJCijc'.indexOf(k) !== -1) { e.preventDefault(); return false; } // Inspect/Console/Picker
    if (ctrl && 'Uu'.indexOf(k) !== -1) { e.preventDefault(); return false; } // View Source
    if (ctrl && 'Ss'.indexOf(k) !== -1) { e.preventDefault(); return false; } // Save Page
    if (ctrl && 'Pp'.indexOf(k) !== -1) { e.preventDefault(); return false; } // Print
    if (ctrl && 'Aa'.indexOf(k) !== -1) {
      var t = document.activeElement ? document.activeElement.tagName : '';
      if (t !== 'INPUT' && t !== 'TEXTAREA' && t !== 'SELECT') { e.preventDefault(); return false; }
    }
  }, true);

  /* ── 4. PRINT BLOCKED ────────────────────────────────────────────── */
  window.addEventListener('beforeprint', function(e) { if(!window.__mmPrintOK){ e.preventDefault(); window.stop(); } });

  /* ── 5. TEXT SELECTION DISABLED (except form fields) ────────────── */
  document.addEventListener('selectstart', function(e) {
    var t = (e.target || {}).tagName;
    if (t === 'INPUT' || t === 'TEXTAREA' || t === 'SELECT') return;
    e.preventDefault(); return false;
  }, true);

  /* ── 6. DRAG DISABLED ────────────────────────────────────────────── */
  document.addEventListener('dragstart', function(e) { e.preventDefault(); return false; }, true);

  /* ── 7. BULK COPY BLOCKED ────────────────────────────────────────── */
  document.addEventListener('copy', function(e) {
    var sel = window.getSelection ? window.getSelection().toString() : '';
    if (sel && sel.length > 120) {
      if (e.clipboardData) e.clipboardData.setData('text/plain', '');
      e.preventDefault(); return false;
    }
  }, true);

  /* ── 8. DEVTOOLS DETECTION ───────────────────────────────────────── */
  var _wiped = false;
  var _lockScreen = function() {
    if (_wiped) return;
    _wiped = true;
    var r = document.getElementById('root');
    if (r) {
      r.innerHTML =
        '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;'
        + 'height:100vh;background:#060e18;color:#d8e8f5;font-family:sans-serif;gap:16px;'
        + 'text-align:center;padding:40px;">'
        + '<div style="font-size:52px">\u{1F512}</div>'
        + '<div style="font-size:22px;font-weight:700;color:#0284c7">Access Restricted</div>'
        + '<div style="font-size:14px;color:#8ba0c0;max-width:380px;line-height:1.8">'
        + 'Developer tools detected. Close them and reload to continue.</div>'
        + '</div>';
    }
  };

  // Method A: Object property getter — DevTools calls the getter when it renders
  // objects in the scope/watch/console pane. Uses a plain object, NOT console,
  // so React and Babel are completely unaffected.
  var _trapObj = (function() {
    var o = {toString: function(){ _lockScreen(); return ''; }};
    Object.defineProperty(o, 'id', { get: function(){ _lockScreen(); return 0; } });
    return o;
  }());
  // Store in a variable name devtools is likely to auto-inspect
  window['__'] = _trapObj;

  // Method B: Window size heuristic (works for undocked/side-docked DevTools)
  // Deferred 3 seconds so React/Babel finish loading before first check.
  // BUG FIX v3.32.2: require the delta to be present across 2 consecutive polls
  // (≥2 s apart) before locking. A single transient spike (Android split-screen
  // snap, browser zoom change, OS keyboard appearing) is NOT treated as DevTools.
  // Threshold 350 px to reduce false positives on high-DPI / zoomed / split-screen.
  // Require 3 consecutive failures (~6 s) before locking — avoids transient snaps.
  var _sizeFailCount = 0;
  var _sizeCheck = function() {
    if (window.outerWidth  - window.innerWidth  > 350 ||
        window.outerHeight - window.innerHeight > 350) {
      _sizeFailCount++;
      if (_sizeFailCount >= 3) { _lockScreen(); }
    } else {
      _sizeFailCount = 0; // reset on any clean poll
    }
  };
  var _poll = function() { _sizeCheck(); setTimeout(_poll, 2000 + Math.random() * 1000); };
  setTimeout(_poll, 3000);

  /* ── 9. BLOCK view-source: / data: URL NAVIGATION ───────────────── */
  var _origOpen = window.open;
  window.open = function(url) {
    if (typeof url === 'string' &&
       (url.indexOf('view-source:') === 0 || url.indexOf('data:text/html') === 0)) return null;
    return _origOpen.apply(this, arguments);
  };

  /* ── 10. INJECTED EXTERNAL SCRIPT BLOCKER ────────────────────────── */
  // Only blocks <script src="..."> tags from unknown domains.
  // Inline scripts and Babel-transpiled scripts are explicitly allowed.
  window.addEventListener('DOMContentLoaded', function() {
    var TRUSTED = ['cdnjs.cloudflare.com', 'fonts.googleapis.com', 'fonts.gstatic.com'];
    var obs = new MutationObserver(function(muts) {
      muts.forEach(function(m) {
        m.addedNodes.forEach(function(node) {
          if (node.nodeName === 'SCRIPT' && node.src) {
            var trusted = TRUSTED.some(function(d) { return node.src.indexOf(d) !== -1; });
            if (!trusted) node.remove();
          }
        });
      });
    });
    obs.observe(document.documentElement, { childList: true, subtree: true });
  });

  /* ── 11. BROWSER FINGERPRINT ─────────────────────────────────────── */
  try {
    var _fp = [navigator.userAgent, navigator.language, navigator.platform,
               screen.width, screen.height, screen.colorDepth,
               new Date().getTimezoneOffset()].join('|');
    var _h = 0;
    for (var _i = 0; _i < _fp.length; _i++) { _h = ((_h << 5) - _h) + _fp.charCodeAt(_i); _h |= 0; }
    window.__mm_fp = (_h >>> 0).toString(16);
  } catch(e) {}

})();
</script>

<!-- ① preconnect to both font & JS CDNs — saves ~100ms per domain on first paint -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin/>
<link rel="dns-prefetch" href="https://cdnjs.cloudflare.com"/>

<!-- ③ Preload critical weights (logo/headings: Sora 700/800, body: DM Sans 400/500)
     as="style" fetches the CSS early; onload swaps rel to stylesheet non-blocking -->
<link rel="preload" as="style"
      href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800&family=DM+Sans:wght@400;500&family=Nunito:wght@700;800;900&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"/>

<!-- ④ Full font set — non-render-blocking via preload→stylesheet swap
     &display=swap is preserved so Google Fonts injects font-display:swap into
     every @font-face rule it returns, eliminating invisible-text flash (FOIT) -->
<link rel="preload" as="style"
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Nunito:wght@700;800;900&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"/>
<!-- Fallback for browsers that don't support preload (≈ 0.5 % share) -->
<noscript>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Nunito:wght@700;800;900&display=swap"/>
</noscript>

<!-- ⑤ Explicit @font-face font-display:swap for system fallbacks while Google Fonts loads -->
<style>
/* Guarantee swap behaviour even before the Google Fonts CSS arrives */
@font-face{font-family:'Sora';font-style:normal;font-weight:700 800;font-display:swap;src:local('Sora')}
@font-face{font-family:'DM Sans';font-style:normal;font-weight:400 500;font-display:swap;src:local('DM Sans')}
</style>
<!-- defer: all three download in parallel, execute in declaration order after the
     DOM is fully parsed but before DOMContentLoaded fires — which is exactly when
     Babel scans for <script type="text/babel"> and transpiles the app. -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin defer></script>
<!-- Babel loads last; defer ensures DOM is fully parsed before transpilation -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js" defer></script>
<!-- Preload Babel so it downloads in parallel with React without delaying FCP -->
<link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js" as="script" crossorigin/>

/* ── Safe-area insets: Android edge-to-edge & notch/cutout support ── */
*,*::before,*::after{box-sizing:border-box}
html{
  /* Extend background behind status bar and nav bar */
  background:#05080f;
  /* Prevent tap highlight on Android */
  -webkit-tap-highlight-color:transparent;
}
body{
  /* Push content away from system bars using env() safe areas */
  padding-top:    env(safe-area-inset-top,    0px);
  padding-bottom: env(safe-area-inset-bottom, 0px);
  padding-left:   env(safe-area-inset-left,   0px);
  padding-right:  env(safe-area-inset-right,  0px);
  /* Prevent overscroll glow on Android */
  overscroll-behavior: none;
  /* Full viewport */
  min-height: 100dvh;
  /* Disable text selection for app-like feel */
  -webkit-user-select: none;
  user-select: none;
}
/* Re-enable selection in inputs and text areas */
input, textarea, [contenteditable] {
  -webkit-user-select: text;
  user-select: text;
}
/* Scrollbar styling for Android WebView */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
/* ── Performance: CSS containment ── */
/* Contain layout/paint for card containers — prevents full-page reflows */
.card-container, .stat-card { contain: layout style; }
/* Content-visibility for long scrollable lists — skips offscreen layout/paint */
.scroll-list { content-visibility: auto; contain-intrinsic-size: auto 500px; }
/* Prevent layout thrashing on animated elements */
#mm-splash .sp-orb { will-change: transform, box-shadow; }
#mm-splash .sp-ticker-line { will-change: stroke-dashoffset; }
#mm-splash .sp-progress-fill { will-change: width; }
#mm-splash .sp-pt { will-change: transform, opacity; }
/* Disable expensive effects on low-power devices */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}

@media print{
  /* ── Block Ctrl+P unless controlled export mode is active ── */
  html:not([data-mm-printing]) body * { visibility: hidden !important; }
  html:not([data-mm-printing]) body::after {
    visibility: visible !important;
    content: "Printing is disabled for this application.";
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    font-size: 20px; font-family: sans-serif; color: #333;
  }
  /* ── Controlled PDF export: show only the report print area ── */
  html[data-mm-printing] * { visibility: hidden !important; }
  html[data-mm-printing] #rpt-print-area,
  html[data-mm-printing] #rpt-print-area * { visibility: visible !important; }
  html[data-mm-printing] #rpt-print-area {
    /* Reflow to top-left so content fills the page naturally */
    position: absolute !important; top: 0 !important; left: 0 !important;
    width: 210mm !important; overflow: visible !important;
    padding: 0 !important; margin: 0 !important;
    /* Force light palette so charts & text are readable on white paper */
    --bg: #ffffff; --bg2: #f8f9fa; --bg3: #f1f5f9; --bg4: #e2e8f0;
    --card: #ffffff; --card2: #f8fafc; --card3: #f0f4f8;
    --border: #cbd5e1; --border2: #e2e8f0;
    --text: #0f172a; --text2: #1e293b; --text3: #334155;
    --text4: #475569; --text5: #64748b; --text6: #94a3b8;
    --accent: #1d4ed8; --accentbg: #eff6ff; --accentbg2: #dbeafe; --accentbg3: #bfdbfe;
    --inp-bg: #f8fafc; --scrollbar: #cbd5e1; --subnav-bg: #eff6ff;
    background: #ffffff !important;
  }
  html[data-mm-printing] .no-print { display: none !important; visibility: hidden !important; }
  /* Ensure cards & section backgrounds render correctly */
  html[data-mm-printing] #rpt-print-area .card,
  html[data-mm-printing] #rpt-print-area [class*="card"] { background: #ffffff !important; border: 1px solid #e2e8f0 !important; box-shadow: none !important; }
  /* A4 page setup */
  @page { size: A4 portrait; margin: 14mm 12mm 14mm 12mm; }
}
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;transition:background .3s,color .3s}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--scrolltrack)}
::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--scrollbar2)}
.inp{width:100%;box-sizing:border-box;background:var(--inp-bg);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:9px 13px;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s,background .3s,color .3s}
.inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accentbg3)}
.inp::placeholder{color:var(--text5)}
select.inp option{background:var(--inp-opt)}
@keyframes fadeUp{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
@keyframes db-rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes db-bar-grow{from{width:0}to{width:var(--bar-w)}}
@keyframes db-pulse-ring{0%{transform:scale(1);opacity:.5}70%{transform:scale(1.6);opacity:0}100%{transform:scale(1.6);opacity:0}}
@keyframes tx-flash{0%{box-shadow:inset 0 0 0 2px var(--accent),inset 0 0 24px var(--accentbg5)}40%{box-shadow:inset 0 0 0 2px var(--accent),inset 0 0 24px var(--accentbg5)}85%{box-shadow:inset 0 0 0 1px var(--accentbg),inset 0 0 10px transparent}100%{box-shadow:none}}
@keyframes pinShake{0%,100%{transform:translateX(0)}15%{transform:translateX(-10px)}35%{transform:translateX(10px)}55%{transform:translateX(-7px)}75%{transform:translateX(7px)}90%{transform:translateX(-3px)}}
@keyframes fsaPulse{0%,100%{box-shadow:0 0 0 0 rgba(251,146,60,.55),0 8px 32px rgba(0,0,0,.35)}60%{box-shadow:0 0 0 8px rgba(251,146,60,.0),0 8px 32px rgba(0,0,0,.35)}}
@keyframes undoSlideUp{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes fsaSlideIn{from{opacity:0;transform:translateY(24px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes fsaIconSpin{0%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}100%{transform:rotate(-8deg)}}
.fu{animation:fadeUp .35s ease forwards}

/* ── Responsive sidebar ── */
/* Sidebar collapse toggle */
.nav-collapse-btn{

  position:absolute;left:calc(100% + 10px);top:50%;transform:translateY(-50%);
  background:var(--bg3);border:1px solid var(--border);
  color:var(--text2);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;

/* ── Nav colour variables ─────────────────────────────────────────────
   --nic       = vivid item colour (e.g. #fbbf24)
   --nic-glow  = same colour at ~30% alpha  (rgba)
   --nic-soft  = same colour at ~14% alpha  (rgba)
   Set on each nav button element inline. ─────────────────────────── */

/* ── Collapsed sidebar: active icon — vivid per-item colour ── */
.nb-icon-active{
  background:linear-gradient(135deg,var(--nic-glow),var(--nic-soft))!important;
  color:var(--nic,var(--accent))!important;
  box-shadow:0 0 0 2px var(--nic-glow),0 4px 18px var(--nic-glow);
}

/* ── Full sidebar: active button — vivid per-item sweep + glowing border ── */
.nb-full-active{
  background:linear-gradient(90deg,var(--nic-soft) 0%,rgba(0,0,0,.04) 70%,transparent 100%)!important;
  color:var(--nic,var(--accent))!important;
  border-left:3px solid var(--nic,var(--accent))!important;
  font-weight:700!important;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.08),
    inset 0 -1px 0 rgba(255,255,255,.03),
    0 2px 18px var(--nic-soft)!important;
}
/* Icon inside the active full-sidebar row */
.nb-full-active>svg,.nb-full-active [data-nav-icon]{
  filter:drop-shadow(0 0 5px var(--nic-glow));
}
@media(max-width:768px){
  .mobile-content-panel{padding:14px 10px 32px!important;}
  /* Toolbar wraps on mobile */
  .tb-toolbar{flex-wrap:wrap!important;}
  /* Hide ledger table on mobile - use card list instead */
  .ldg-table-hdr{display:none!important;}
  .ldg-mobile-card{display:flex!important;}
  .ldg-desktop-row{display:none!important;}
}
  /* Modal backdrop: on mobile, offset left by sidebar width (64px) so modal
     centers within the content area, not the full viewport */
  @media (max-width: 768px) {
    .modal-bd {
      left: 64px !important;
    }
    /* Ensure modal inner content uses full available width */
    .modal-bd .fu {
      width: 100%;
      max-width: 100% !important;
    }
  }
  /* Responsive 2-column grid inside modals: 2-col on desktop, 1-col on mobile */
  .grid-2col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  @media (max-width: 520px) {
    .modal-bd .grid-2col {
      grid-template-columns: 1fr;
    }
  }

/* ══ TAX ESTIMATOR SCOPED STYLES ══ */
.tax-wrap {
  /* ── Surfaces & structure → MM theme tokens ── */
  --itr-bg:        var(--bg);
  --itr-surface:   var(--bg3);
  --itr-surface2:  var(--bg5);
  --itr-surface3:  var(--bg4);
  --itr-border:    var(--border);
  --itr-border2:   var(--border2);
  /* ── Navy/blue → MM accent ── */
  --itr-navy:      var(--accent2);
  --itr-navy2:     var(--accent);
  --itr-navy-lt:   var(--accentbg);
  /* ── Semantic colors — fixed regardless of theme ── */
  --itr-saffron:   #d97706;
  --itr-saffron-lt:rgba(217,119,6,.10);
  --itr-saffron-bd:rgba(217,119,6,.30);
  --itr-green:     #16a34a;
  --itr-green-lt:  rgba(22,163,74,.10);
  --itr-green-bd:  rgba(22,163,74,.30);
  --itr-red:       #dc2626;
  --itr-red-lt:    rgba(220,38,38,.08);
  --itr-red-bd:    rgba(220,38,38,.28);
  --itr-orange:    #c2500a;
  --itr-orange-lt: rgba(194,80,10,.09);
  /* ── Blue info notes → MM accent ── */
  --itr-blue:      var(--accent);
  --itr-blue-lt:   var(--accentbg2);
  --itr-blue-bd:   var(--accentbg5);
  /* ── Text → MM text tokens ── */
  --itr-text:      var(--text);
  --itr-text2:     var(--text4);
  --itr-text3:     var(--text6);
  /* ── Shadows → subtle MM-style ── */
  --itr-shadow:    0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.04);
  --itr-shadow-md: 0 2px 8px rgba(0,0,0,.08),0 6px 20px rgba(0,0,0,.06);
  /* ── Typography ── */
  font-family: 'DM Sans',sans-serif;
  color: var(--text);
}

/* ══════════════════════════════════════════════════════════════════════════
   SELECTION SIGNATURE SYSTEM
   One vivid accent treatment echoes the sidebar nav-bar active style across
   every selection state in the app:
     • accent label colour   (vivid, not muted)
     • border strip          (3px solid at the active edge)
     • gradient tint bg      (from accentbg at edge → transparent/accentbg2)
     • ambient glow shadow   (soft accentbg5 halo)
   Three utility classes + ::selection pseudo-element.
   ══════════════════════════════════════════════════════════════════════════ */
@keyframes mm-sel-pop{0%{opacity:.7;transform:scale(.97)}60%{transform:scale(1.015)}100%{opacity:1;transform:scale(1)}}

/* ── Text highlight (browser ::selection) ─────────────────────────────── */
::selection{background:var(--accentbg5);color:var(--accent);}
::-moz-selection{background:var(--accentbg5);color:var(--accent);}

/* ── Horizontal tab — bottom border strip, top→bottom tint ───────────── */
.mm-tab-sel{
  background:linear-gradient(180deg,var(--accentbg),var(--accentbg2))!important;
  color:var(--accent)!important;
  font-weight:700!important;
  border-bottom:3px solid var(--accent)!important;
  box-shadow:0 3px 16px var(--accentbg5)!important;
  position:relative;
  animation:mm-sel-pop .2s ease both;
}
.mm-tab-sel::after{
  content:'';position:absolute;bottom:0;left:10%;right:10%;
  height:3px;background:var(--accent);
  border-radius:2px 2px 0 0;
  box-shadow:0 0 10px var(--accentbg5),0 0 4px var(--accent);
  pointer-events:none;
}

/* ── Pill / chip — full accent border + glow ring ─────────────────────── */
.mm-pill-sel{
  background:linear-gradient(135deg,var(--accentbg),var(--accentbg2))!important;
  color:var(--accent)!important;
  font-weight:700!important;
  border:1.5px solid var(--accent)!important;
  box-shadow:0 0 0 3px var(--accentbg5),0 2px 12px var(--accentbg5)!important;
  animation:mm-sel-pop .2s ease both;
}

/* ── List row — left border sweep (mirrors full nav bar active) ─────────── */
.mm-row-sel{
  background:linear-gradient(90deg,var(--accentbg),var(--accentbg2) 55%,transparent 100%)!important;
  color:var(--accent)!important;
  font-weight:600!important;
  border-left:3px solid var(--accent)!important;
  box-shadow:inset 3px 0 12px var(--accentbg5)!important;
  animation:mm-sel-pop .2s ease both;
}

@keyframes sp-float    {0%,100%{transform:translateY(0)}50%{transform:translateY(-11px)}}
@keyframes sp-bar      {from{transform:scaleY(0);opacity:0}to{transform:scaleY(1);opacity:1}}
@keyframes sp-ripple   {0%{transform:scale(.6);opacity:.7}100%{transform:scale(2.2);opacity:0}}
@keyframes sp-progress {from{width:0}to{width:92%}}

/* Wave path animations — each layer shifts at different speed */
@keyframes sp-wave1{0%{d:path("M0,56 C160,20 340,88 520,52 C700,16 880,72 1060,48 C1200,28 1300,52 1440,40 L1440,160 L0,160Z")}50%{d:path("M0,40 C160,76 340,16 520,60 C700,104 880,28 1060,64 C1200,88 1300,40 1440,56 L1440,160 L0,160Z")}100%{d:path("M0,56 C160,20 340,88 520,52 C700,16 880,72 1060,48 C1200,28 1300,52 1440,40 L1440,160 L0,160Z")}}
@keyframes sp-wave2{0%{d:path("M0,72 C200,40 400,100 600,64 C800,28 1000,84 1200,56 C1320,38 1380,60 1440,50 L1440,160 L0,160Z")}50%{d:path("M0,48 C200,88 400,28 600,72 C800,116 1000,44 1200,80 C1320,102 1380,62 1440,74 L1440,160 L0,160Z")}100%{d:path("M0,72 C200,40 400,100 600,64 C800,28 1000,84 1200,56 C1320,38 1380,60 1440,50 L1440,160 L0,160Z")}}
@keyframes sp-wave3{0%{d:path("M0,90 C240,60 480,115 720,80 C960,45 1160,95 1320,70 C1380,60 1420,72 1440,68 L1440,160 L0,160Z")}50%{d:path("M0,65 C240,100 480,48 720,88 C960,128 1160,68 1320,100 C1380,116 1420,88 1440,96 L1440,160 L0,160Z")}100%{d:path("M0,90 C240,60 480,115 720,80 C960,45 1160,95 1320,70 C1380,60 1420,72 1440,68 L1440,160 L0,160Z")}}

/* Particle float paths */
@keyframes sp-p1{0%,100%{transform:translate(0,0);opacity:.6}33%{transform:translate(-14px,-28px);opacity:1}66%{transform:translate(10px,-18px);opacity:.7}}
@keyframes sp-p2{0%,100%{transform:translate(0,0);opacity:.4}40%{transform:translate(18px,-36px);opacity:.9}75%{transform:translate(-8px,-20px);opacity:.6}}
@keyframes sp-p3{0%,100%{transform:translate(0,0);opacity:.5}50%{transform:translate(-20px,-24px);opacity:1}}
@keyframes sp-p4{0%,100%{transform:translate(0,0);opacity:.35}45%{transform:translate(12px,-40px);opacity:.85}80%{transform:translate(-6px,-16px);opacity:.55}}
@keyframes sp-p5{0%,100%{transform:translate(0,0);opacity:.6}60%{transform:translate(22px,-30px);opacity:1}}

/* Glow pulse for logo orb */
@keyframes sp-glow{0%,100%{box-shadow:0 0 24px 4px rgba(2,132,199,.28),0 0 60px 0 rgba(2,132,199,.08)}50%{box-shadow:0 0 40px 8px rgba(2,132,199,.45),0 0 90px 4px rgba(14,165,233,.14)}}

/* Ticker line draw */
@keyframes sp-draw{from{stroke-dashoffset:420}to{stroke-dashoffset:0}}

/* ── Root container ───────────────────────────────── */
#mm-splash{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:#05080f;
  overflow:hidden;
  font-family:'Nunito',sans-serif;
  z-index:9999;
}

/* ── Radial depth gradient (center brightens slightly) ── */
#mm-splash::before{
  content:'';
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 70% 60% at 50% 50%, rgba(2,132,199,.055) 0%, transparent 70%),
    radial-gradient(ellipse 40% 35% at 30% 20%, rgba(14,165,233,.04) 0%, transparent 60%),
    radial-gradient(ellipse 30% 40% at 75% 75%, rgba(6,182,212,.035) 0%, transparent 60%);
  pointer-events:none;
}

/* ── Grid texture overlay ─────────────────────────── */
#mm-splash::after{
  content:'';
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(2,132,199,.028) 1px, transparent 1px),
    linear-gradient(90deg, rgba(2,132,199,.028) 1px, transparent 1px);
  background-size:48px 48px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
  pointer-events:none;
  opacity:.6;
}

/* ── Wave SVG (bottom) ───────────────────────────── */
#mm-splash-waves{
  position:absolute;
  bottom:0;left:0;right:0;
  height:220px;
  overflow:hidden;
  pointer-events:none;
}
#mm-splash-waves svg{
  position:absolute;bottom:0;left:0;
  width:100%;height:100%;
}

/* Wave layers */
.sp-wv1 path{animation:sp-wave1 7s ease-in-out infinite;fill:rgba(241,194,50,.10)}
.sp-wv2 path{animation:sp-wave2 9s ease-in-out infinite;animation-delay:-.5s;fill:rgba(14,165,233,.07)}
.sp-wv3 path{animation:sp-wave3 11s ease-in-out infinite;animation-delay:-2s;fill:rgba(241,194,50,.05)}

/* ── Floating particles ──────────────────────────── */
#mm-splash-particles{
  position:absolute;inset:0;
  pointer-events:none;
  overflow:hidden;
}
.sp-pt{
  position:absolute;
  border-radius:50%;
  background:rgba(14,165,233,.7);
}
.sp-pt:nth-child(1){width:4px;height:4px;top:22%;left:18%;animation:sp-p1 5.5s ease-in-out infinite}
.sp-pt:nth-child(2){width:3px;height:3px;top:35%;left:72%;animation:sp-p2 7s ease-in-out infinite;background:rgba(6,182,212,.65)}
.sp-pt:nth-child(3){width:5px;height:5px;top:55%;left:32%;animation:sp-p3 6.5s ease-in-out infinite;background:rgba(2,132,199,.55)}
.sp-pt:nth-child(4){width:3px;height:3px;top:18%;left:58%;animation:sp-p4 8s ease-in-out infinite;background:rgba(56,189,248,.6)}
.sp-pt:nth-child(5){width:4px;height:4px;top:68%;left:80%;animation:sp-p5 6s ease-in-out infinite;background:rgba(14,165,233,.5)}
.sp-pt:nth-child(6){width:2px;height:2px;top:42%;left:88%;animation:sp-p1 7.5s ease-in-out infinite 1s;background:rgba(56,189,248,.7)}
.sp-pt:nth-child(7){width:3px;height:3px;top:78%;left:14%;animation:sp-p3 5s ease-in-out infinite .5s;background:rgba(2,132,199,.6)}
.sp-pt:nth-child(8){width:4px;height:4px;top:12%;left:40%;animation:sp-p2 9s ease-in-out infinite .2s;background:rgba(6,182,212,.5)}

/* ── Ripple rings ────────────────────────────────── */
.sp-ripple{
  position:absolute;
  border-radius:50%;
  border:1px solid rgba(2,132,199,.25);
  pointer-events:none;
}
.sp-ripple:nth-child(1){width:160px;height:160px;top:50%;left:50%;margin:-80px 0 0 -80px;animation:sp-ripple 3.6s ease-out infinite}
.sp-ripple:nth-child(2){width:160px;height:160px;top:50%;left:50%;margin:-80px 0 0 -80px;animation:sp-ripple 3.6s ease-out infinite 1.2s}
.sp-ripple:nth-child(3){width:160px;height:160px;top:50%;left:50%;margin:-80px 0 0 -80px;animation:sp-ripple 3.6s ease-out infinite 2.4s}

/* ── Centre branding ─────────────────────────────── */
#mm-splash-center{
  position:relative;z-index:2;
  display:flex;flex-direction:column;
  align-items:center;gap:0;
  animation:sp-fadein .7s .1s ease both;
}

/* Orb */
.sp-orb{
  width:96px;height:96px;
  border-radius:50%;
  background:radial-gradient(circle at 35% 35%, rgba(56,189,248,.22), rgba(2,132,199,.12) 60%, transparent);
  border:1px solid rgba(56,189,248,.28);
  display:flex;align-items:center;justify-content:center;
  animation:sp-glow 3s ease-in-out infinite, sp-float 5s ease-in-out infinite;
  margin-bottom:28px;
  position:relative;
}
.sp-orb::before{
  content:'';
  position:absolute;inset:-1px;
  border-radius:50%;
  border:1px solid rgba(56,189,248,.12);
  animation:sp-ripple 2.8s ease-out infinite;
}

/* Rupee symbol inside orb */
.sp-orb-symbol{
  font-size:40px;font-weight:900;
  color:#38bdf8;
  text-shadow:0 0 24px rgba(56,189,248,.6),0 0 8px rgba(2,132,199,.4);
  font-family:'Nunito',sans-serif;
  line-height:1;
  letter-spacing:-1px;
  animation:sp-float 5s ease-in-out infinite;
}

/* Orbiting dot */
.sp-orbit-wrap{
  position:absolute;inset:0;
  animation:sp-orbit 4s linear infinite;
  transform-origin:center;
}
.sp-orbit-dot{
  position:absolute;
  top:4px;left:50%;
  width:6px;height:6px;
  border-radius:50%;
  background:#38bdf8;
  box-shadow:0 0 8px 2px rgba(56,189,248,.6);
  transform:translateX(-50%);
}

/* Logo wordmark */
.sp-wordmark{
  font-size:36px;font-weight:800;
  color:#e0f2fe;
  letter-spacing:-1px;
  font-family:'Nunito',sans-serif;
  animation:sp-logopop .65s .2s ease both;
  opacity:0;
  line-height:1;
}
.sp-wordmark em{
  color:#38bdf8;
  font-style:normal;
  text-shadow:0 0 20px rgba(56,189,248,.5);
}

/* Tagline */
.sp-tagline{
  font-size:11.5px;
  color:rgba(148,196,230,.55);
  letter-spacing:3px;
  text-transform:uppercase;
  margin-top:8px;
  font-weight:600;
  animation:sp-fadein .6s .55s ease both;opacity:0;
  font-family:'DM Sans',sans-serif;
}

/* Ticker sparkline */
.sp-ticker{
  margin-top:32px;
  opacity:0;
  animation:sp-fadein .6s .75s ease both;
}
.sp-ticker svg{overflow:visible}
.sp-ticker-line{
  stroke-dasharray:420;
  stroke-dashoffset:420;
  animation:sp-draw 1.8s .9s cubic-bezier(.4,0,.2,1) forwards;
}

/* Progress bar */
.sp-progress-wrap{
  margin-top:40px;
  width:200px;
  height:2px;
  background:rgba(2,132,199,.12);
  border-radius:2px;
  overflow:hidden;
  animation:sp-fadein .4s .8s ease both;opacity:0;
}
.sp-progress-fill{
  height:100%;
  background:linear-gradient(90deg,rgba(2,132,199,.5),#38bdf8,rgba(6,182,212,.8));
  border-radius:2px;
  width:0;
  animation:sp-progress 2.8s .85s cubic-bezier(.4,0,.6,1) forwards;
  box-shadow:0 0 8px rgba(56,189,248,.5);
}

/* Loading label */
.sp-label{
  margin-top:14px;
  font-size:10.5px;
  color:rgba(56,189,248,.42);
  letter-spacing:2.5px;
  text-transform:uppercase;
  font-weight:600;
  font-family:'DM Sans',sans-serif;
  animation:sp-shimmer 2s ease-in-out infinite, sp-fadein .5s .9s ease both;
  opacity:0;
}
</style>
