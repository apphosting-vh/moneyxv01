<meta name="description" content="Offline personal finance manager for India — banks, cards, investments, loans."/>

<!-- Service Worker registration -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('https://apphosting-vh.github.io/moneyxv01/sw.js', { scope: './' })
        .then(reg => {
          console.log('[SW] Registered, scope:', reg.scope);
          /* Listen for price-sync messages from SW background sync */
          navigator.serviceWorker.addEventListener('message', e => {
            if (e.data?.type === 'SYNC_PRICES') {
              window.dispatchEvent(new CustomEvent('mm:sync-prices'));
            }
          });
        })
        .catch(err => console.warn('[SW] Registration failed:', err));
    });
  }
</script>

*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;transition:background .3s,color .3s}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--scrolltrack)}
::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--scrollbar2)}
.inp{width:100%;background:var(--inp-bg);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:9px 13px;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s,background .3s,color .3s}
.inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accentbg3)}
.inp::placeholder{color:var(--text5)}
select.inp option{background:var(--inp-opt)}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fu{animation:fadeUp .35s ease forwards}
.si{animation:slideIn .25s ease forwards}
.spinr{animation:spin 1s linear infinite;display:inline-block}
.tr:hover{background:var(--accentbg2)!important}
.nb:hover{background:var(--accentbg4)!important;color:var(--accent2)!important}
.accard{cursor:pointer;transition:border-color .2s,transform .15s,box-shadow .2s}
.accard:hover{border-color:var(--accent)44!important;transform:translateY(-1px)}
.accard.active{border-color:var(--accent)!important;box-shadow:0 0 0 2px var(--accentbg5)!important}
.mr:hover{background:var(--mr-hover)!important}
.txrow{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-bottom:1px solid var(--border3);transition:background .15s;gap:12px}
.txrow:hover{background:var(--accentbg2)}
.txrow:last-child{border-bottom:none}
textarea.inp{resize:vertical}

const calcFDMaturity=(principal,ratePercent,startDate,maturityDate)=>{

  const start=new Date(startDate),end=new Date(maturityDate);
  const days=Math.max(0,Math.round((end-start)/(1000*60*60*24)));
  const years=days/365;
  const r=ratePercent/100;
  const maturity=principal*Math.pow(1+r/4,4*years);
  return Math.round(maturity);
};

const reducer=(s,a)=>{

      balance:b.balance-(a.old.type==="credit"?a.old.amount:-a.old.amount)+(a.tx.type==="credit"?a.tx.amount:-a.tx.amount),
      transactions:b.transactions.map(t=>t.id===a.tx.id?a.tx:t)}:b)};

    case"DUP_BANK_TX":return{...s,banks:s.banks.map(b=>b.id===a.accId?{...b,
      balance:b.balance+(a.tx.type==="credit"?a.tx.amount:-a.tx.amount),

    case"EDIT_BANK":return{...s,banks:s.banks.map(b=>b.id===a.p.id?{...b,...a.p}:b)};

      transactions:c.transactions.filter(t=>t.id!==a.tx.id)}:c)};
    case"DUP_CARD_TX":return{...s,cards:s.cards.map(c=>c.id===a.accId?{...c,

    case"SET_CASH_BAL":return{...s,cash:{...s.cash,balance:a.val}};
    case"EDIT_CASH_TX":return{...s,cash:{...s.cash,
      balance:s.cash.balance-(a.old.type==="credit"?a.old.amount:-a.old.amount)+(a.tx.type==="credit"?a.tx.amount:-a.tx.amount),
      transactions:s.cash.transactions.map(t=>t.id===a.tx.id?a.tx:t)}};
    case"DEL_CASH_TX":return{...s,cash:{...s.cash,
      balance:s.cash.balance-(a.tx.type==="credit"?a.tx.amount:-a.tx.amount),

    case"DUP_CASH_TX":return{...s,cash:{...s.cash,

    case"ADD_MF":return{...s,mf:[...s.mf,a.p]};

    case"ADD_FD":return{...s,fd:[...s.fd,a.p]};
    case"EDIT_FD":return{...s,fd:s.fd.map(f=>f.id===a.p.id?{...f,...a.p}:f)};
    case"DEL_FD":return{...s,fd:s.fd.filter(f=>f.id!==a.id)};
    case"IMPORT_BULK_MF":return{...s,mf:[...s.mf,...(a.items||[])]};
    case"IMPORT_BULK_FD":return{...s,fd:[...s.fd,...(a.items||[])]};
    case"ADD_LOAN":return{...s,loans:[...s.loans,a.p]};
    case"EDIT_LOAN":return{...s,loans:s.loans.map(l=>l.id===a.p.id?{...l,...a.p}:l)};
    case"DEL_LOAN":return{...s,loans:s.loans.filter(l=>l.id!==a.id)};
    case"ADD_CAT":return{...s,categories:[...s.categories,{id:"c_"+uid(),name:a.name,color:a.color||"#8ba0c0",classType:a.classType||"Expense",subs:[]}]};
    case"DEL_CAT":return{...s,categories:s.categories.filter(c=>c.id!==a.id)};
    case"EDIT_CAT":return{...s,categories:s.categories.map(c=>c.id===a.p.id?{...c,...a.p}:c)};
    case"ADD_SUBCAT":return{...s,categories:s.categories.map(c=>c.id===a.catId?{...c,subs:[...c.subs,{id:"cs_"+uid(),name:a.name}]}:c)};
    case"DEL_SUBCAT":return{...s,categories:s.categories.map(c=>c.id===a.catId?{...c,subs:c.subs.filter(sc=>sc.id!==a.subId)}:c)};
    case"EDIT_SUBCAT":return{...s,categories:s.categories.map(c=>c.id===a.catId?{...c,subs:c.subs.map(sc=>sc.id===a.subId?{...sc,name:a.name}:sc)}:c)};
    case"ADD_SCHEDULED":return{...s,scheduled:[...( s.scheduled||[]),{...a.p,id:uid()}]};
    case"DEL_SCHEDULED":return{...s,scheduled:(s.scheduled||[]).filter(sc=>sc.id!==a.id)};
    case"EDIT_SCHEDULED":return{...s,scheduled:(s.scheduled||[]).map(sc=>sc.id===a.p.id?{...sc,...a.p}:sc)};
    case"EXECUTE_SCHEDULED":{
      /* Fire scheduled tx into the target account and mark as lastExecuted */
      const sc=a.sc;
      const tx={id:uid(),date:sc.nextDate,desc:sc.desc,payee:sc.payee,amount:sc.amount,type:sc.ledgerType,cat:sc.cat,txType:sc.txType,tags:sc.tags||"",status:"Unreconciled",txNum:"",notes:"Scheduled: "+sc.desc};
      let ns={...s};
      if(sc.accType==="bank")ns={...ns,banks:ns.banks.map(b=>b.id===sc.accId?{...b,balance:b.balance+(tx.type==="credit"?tx.amount:-tx.amount),transactions:[...b.transactions,tx]}:b)};
      else if(sc.accType==="card")ns={...ns,cards:ns.cards.map(c=>c.id===sc.accId?{...c,outstanding:c.outstanding+(tx.type==="debit"?tx.amount:-tx.amount),transactions:[...c.transactions,tx]}:c)};
      else if(sc.accType==="cash")ns={...ns,cash:{...ns.cash,balance:ns.cash.balance+(tx.type==="credit"?tx.amount:-tx.amount),transactions:[...ns.cash.transactions,tx]}};
      /* Advance nextDate based on frequency */
      const advance=(d,freq)=>{const dt=new Date(d+"T12:00:00");if(freq==="daily")dt.setDate(dt.getDate()+1);else if(freq==="weekly")dt.setDate(dt.getDate()+7);else if(freq==="monthly")dt.setMonth(dt.getMonth()+1);else if(freq==="quarterly")dt.setMonth(dt.getMonth()+3);else if(freq==="yearly")dt.setFullYear(dt.getFullYear()+1);return dt.toISOString().split("T")[0];};
      const isOnce=sc.frequency==="once";
      const newNext=isOnce?null:advance(sc.nextDate,sc.frequency);
      const expired=isOnce||(sc.endDate&&newNext>sc.endDate);
      ns={...ns,scheduled:(ns.scheduled||[]).map(x=>x.id===sc.id?{...x,lastExecuted:sc.nextDate,nextDate:expired?null:newNext,status:expired?"completed":"active"}:x)};
      return ns;
    }
    /* Transfer: debit source, credit target -- supports bank/cash/card */
    case"TRANSFER_TX":{
      const{srcType,srcId,tgtType,tgtId,tx}=a;
      const debitTx={...tx,type:"debit",id:uid(),cat:tx.cat||"Transfer"};
      const creditTx={...tx,type:"credit",id:uid(),desc:tx.desc||"Transfer In",cat:tx.cat||"Transfer"};
      let ns={...s};
      // ── debit source
      if(srcType==="bank")
        ns={...ns,banks:ns.banks.map(b=>b.id===srcId?{...b,balance:b.balance-tx.amount,transactions:[...b.transactions,debitTx]}:b)};
      else if(srcType==="cash")
        ns={...ns,cash:{...ns.cash,balance:ns.cash.balance-tx.amount,transactions:[...ns.cash.transactions,debitTx]}};
      else if(srcType==="card")
        // paying FROM a card = cash advance: increases outstanding
        ns={...ns,cards:ns.cards.map(c=>c.id===srcId?{...c,outstanding:c.outstanding+tx.amount,transactions:[...c.transactions,debitTx]}:c)};
      // ── credit target
      if(tgtType==="bank")
        ns={...ns,banks:ns.banks.map(b=>b.id===tgtId?{...b,balance:b.balance+tx.amount,transactions:[...b.transactions,creditTx]}:b)};
      else if(tgtType==="cash")
        ns={...ns,cash:{...ns.cash,balance:ns.cash.balance+tx.amount,transactions:[...ns.cash.transactions,creditTx]}};
      else if(tgtType==="card")
        // paying TO a card = bill payment: reduces outstanding
        ns={...ns,cards:ns.cards.map(c=>c.id===tgtId?{...c,outstanding:Math.max(0,c.outstanding-tx.amount),transactions:[...c.transactions,{...creditTx,desc:tx.desc||"Card Payment"}]}:c)};
      return ns;
    }
    case"ADD_PAYEE":return{...s,payees:[...s.payees,a.p]};
    case"EDIT_PAYEE":return{...s,payees:s.payees.map(p=>p.id===a.p.id?{...p,...a.p}:p)};
    case"DEL_PAYEE":return{...s,payees:s.payees.filter(p=>p.id!==a.id)};
    case"MASS_UPDATE_STATUS":{
      const{accType:at,accId:aid,ids,status:st}=a;
      if(at==="bank")return{...s,banks:s.banks.map(b=>b.id!==aid?b:{...b,transactions:b.transactions.map(t=>ids.has(t.id)?{...t,status:st}:t)})};
      if(at==="card")return{...s,cards:s.cards.map(c=>c.id!==aid?c:{...c,transactions:c.transactions.map(t=>ids.has(t.id)?{...t,status:st}:t)})};
      if(at==="cash")return{...s,cash:{...s.cash,transactions:s.cash.transactions.map(t=>ids.has(t.id)?{...t,status:st}:t)}};
      return s;
    }
    case"RESTORE_ALL":return{...INIT(),...a.data};
    case"RESET_ALL":return{...EMPTY_STATE()};
    /* Bulk import: a.accType = bank|card|cash, a.accId, a.txns = array of tx objects */
    case"IMPORT_BULK_TX":{
      const{accType,accId,txns}=a;
      if(!txns||!txns.length)return s;
      if(accType==="bank"){
        return{...s,banks:s.banks.map(b=>{
          if(b.id!==accId)return b;
          const netDelta=txns.reduce((d,t)=>d+(t.type==="credit"?t.amount:-t.amount),0);
          return{...b,transactions:[...b.transactions,...txns],balance:b.balance+netDelta};
        })};
      }
      if(accType==="card"){
        return{...s,cards:s.cards.map(c=>{
          if(c.id!==accId)return c;
          // credits = payments (reduce outstanding), debits = purchases (increase outstanding)
          const netDelta=txns.reduce((d,t)=>d+(t.type==="debit"?t.amount:-t.amount),0);
          return{...c,transactions:[...c.transactions,...txns],outstanding:Math.max(0,c.outstanding+netDelta)};
        })};
      }
      if(accType==="cash"){
        const netDelta=txns.reduce((d,t)=>d+(t.type==="credit"?t.amount:-t.amount),0);
        return{...s,cash:{...s.cash,transactions:[...s.cash.transactions,...txns],balance:s.cash.balance+netDelta}};
      }
      return s;
    }
    case"ADD_NOTE":return{...s,notes:[...( s.notes||[]),{...a.p,id:uid(),createdAt:new Date().toISOString()}]};
    case"EDIT_NOTE":return{...s,notes:(s.notes||[]).map(n=>n.id===a.p.id?{...n,...a.p,updatedAt:new Date().toISOString()}:n)};
    case"DEL_NOTE":return{...s,notes:(s.notes||[]).filter(n=>n.id!==a.id)};
    case"IMPORT_BULK_CAT":{
      /* Merge imported categories -- skip if name already exists */
      const existing=new Set(s.categories.map(c=>c.name.toLowerCase()));
      const newCats=(a.items||[]).filter(c=>c.name&&!existing.has(c.name.toLowerCase())).map(c=>({
        id:"c_"+uid(),
        name:c.name.trim(),
        color:c.color||"#8ba0c0",
        classType:c.classType||"Expense",
        subs:(c.subs||[]).map(sn=>({id:"cs_"+uid(),name:String(sn).trim()})).filter(sc=>sc.name)
      }));
      return{...s,categories:[...s.categories,...newCats]};
    }
    default:return s;
  }
};

const DonutChart=({data,size=170})=>{
  const total=data.reduce((s,d)=>s+d.value,0);
  if(!total)return React.createElement("div",{style:{textAlign:"center",color:"#345",padding:20,fontSize:12}},"No data");
  let angle=-90;
  const cx=size/2,cy=size/2,r=size*.38,ir=size*.23;
  const slices=data.map((d,i)=>{
    const sweep=(d.value/total)*360;
    const a1=angle*(Math.PI/180),a2=(angle+sweep)*(Math.PI/180);
    const x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1);
    const x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
    const xi1=cx+ir*Math.cos(a1),yi1=cy+ir*Math.sin(a1);
    const xi2=cx+ir*Math.cos(a2),yi2=cy+ir*Math.sin(a2);
    const lg=sweep>180?1:0;
    const path=`M${x1},${y1} A${r},${r} 0 ${lg},1 ${x2},${y2} L${xi2},${yi2} A${ir},${ir} 0 ${lg},0 ${xi1},${yi1} Z`;
    angle+=sweep;
    return React.createElement("path",{key:i,d:path,fill:PAL[i%PAL.length],opacity:.9});
  });
  return React.createElement("svg",{width:size,height:size,viewBox:`0 0 ${size} ${size}`,style:{display:"block",margin:"0 auto"}},
    ...slices,React.createElement("circle",{cx,cy,r:ir-2,fill:"var(--bg3)"})
  );
};
const SvgBar=({data,h=155})=>{

  return React.createElement("svg",{width:"100%",viewBox:`0 0 300 ${h+28}`,style:{display:"block"}},
    ...data.map((d,i)=>{
      const bh=Math.max(((d.amount/max)*(h-8)),2),x=pad+i*gap+gap/2-bW/2,y=h-bh;

        React.createElement("rect",{x,y,width:bW,height:bh,rx:3,fill:"var(--accent)",opacity:.85}),
        React.createElement("text",{x:x+bW/2,y:h+16,textAnchor:"middle",fill:"var(--text4)",fontSize:10},d.month)

const detectCol=(headers,aliases)=>{
  const lc=headers.map(h=>(h||"").toString().toLowerCase().trim());
  for(const alias of aliases){
    const idx=lc.findIndex(h=>h===alias||h.includes(alias));
    if(idx>=0)return headers[idx];
  }
  return "";
};

const parseDate=(raw)=>{
  if(!raw)return TODAY();
  // Excel serial date number
  if(typeof raw==="number"){
    const d=new Date(Math.round((raw-25569)*86400*1000));
    return d.toISOString().split("T")[0];
  }
  const s=raw.toString().trim();
  // dd-mm-yyyy or dd/mm/yyyy
  const dmy=s.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})$/);
  if(dmy){
    const [,d,m,y]=dmy;
    const yr=y.length===2?"20"+y:y;
    return `${yr}-${m.padStart(2,"0")}-${d.padStart(2,"0")}`;
  }
  // yyyy-mm-dd
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
  // mm/dd/yyyy
  const mdy=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
  if(mdy){
    const[,m,d,y]=mdy;
    const yr=y.length===2?"20"+y:y;
    return `${yr}-${m.padStart(2,"0")}-${d.padStart(2,"0")}`;
  }
  // Try native parse as fallback
  try{
    const dt=new Date(s);
    if(!isNaN(dt))return dt.toISOString().split("T")[0];
  }catch{}
  return TODAY();
};

const parseAmt=(raw)=>{
  if(raw===null||raw===undefined||raw==="")return 0;
  const n=parseFloat(raw.toString().replace(/[^0-9.\-]/g,""));
  return isNaN(n)?0:Math.abs(n);
};

/* ══════════════════════════════════════════════════════════════════════════
   PAYEE COMBOBOX  -- custom styled dropdown, consistent across all themes
   Props: value, onChange, payees (array of {id,name}), placeholder
   ══════════════════════════════════════════════════════════════════════════ */
const PayeeCombobox=({value,onChange,payees,placeholder="Search or type payee…"})=>{
  const[open,setOpen]=useState(false);
  const[query,setQuery]=useState(value||"");
  const wrapRef=React.useRef(null);

  /* Sync query when value changes externally (e.g. form reset) */
  React.useEffect(()=>{setQuery(value||"");},[value]);

  /* Close on outside click */
  React.useEffect(()=>{
    if(!open)return;
    const handler=e=>{if(wrapRef.current&&!wrapRef.current.contains(e.target))setOpen(false);};
    document.addEventListener("mousedown",handler);
    return()=>document.removeEventListener("mousedown",handler);
  },[open]);

  const filtered=query.trim()===""
    ?payees
    :payees.filter(p=>p.name.toLowerCase().includes(query.toLowerCase()));

  const pick=(name)=>{setQuery(name);onChange(name);setOpen(false);};

  const handleInput=e=>{
    const val=e.target.value;
    setQuery(val);
    onChange(val);
    setOpen(true);
  };

  const handleFocus=()=>setOpen(true);

  const handleKeyDown=e=>{
    if(e.key==="Escape"){setOpen(false);e.target.blur();}
    if(e.key==="Enter"&&filtered.length>0){pick(filtered[0].name);e.preventDefault();}
  };

  return React.createElement("div",{ref:wrapRef,style:{position:"relative"}},
    /* Input row */
    React.createElement("div",{style:{position:"relative",display:"flex",alignItems:"center"}},
      React.createElement("input",{
        className:"inp",
        placeholder,
        value:query,
        onChange:handleInput,
        onFocus:handleFocus,
        onKeyDown:handleKeyDown,
        style:{paddingRight:34}
      }),
      React.createElement("button",{
        type:"button",
        onMouseDown:e=>{e.preventDefault();setOpen(o=>!o);},
        style:{
          position:"absolute",right:0,top:0,bottom:0,
          width:34,display:"flex",alignItems:"center",justifyContent:"center",
          background:"transparent",border:"none",cursor:"pointer",
          color:"var(--text5)",fontSize:11,borderRadius:"0 8px 8px 0",
          transition:"color .15s"
        }
      },"▾")
    ),
    /* Dropdown */
    open&&React.createElement("div",{style:{
      position:"absolute",top:"calc(100% + 4px)",left:0,right:0,zIndex:2000,
      background:"var(--modal-bg)",border:"1px solid var(--border)",
      borderRadius:10,boxShadow:"0 8px 32px rgba(0,0,0,.45)",
      maxHeight:220,overflowY:"auto",
      fontFamily:"'DM Sans',sans-serif"
    }},
      filtered.length===0
        ?React.createElement("div",{style:{
            padding:"12px 14px",fontSize:12,
            color:"var(--text5)",fontStyle:"italic",textAlign:"center"
          }},"No matching payees -- press Enter to use \""+query+"\"")
        :filtered.map(p=>React.createElement("div",{
            key:p.id,
            onMouseDown:e=>{e.preventDefault();pick(p.name);},
            className:"mr",
            style:{
              padding:"10px 14px",cursor:"pointer",
              borderBottom:"1px solid var(--border2)",
              fontSize:13,color:"var(--text2)",
              transition:"background .12s",
              display:"flex",alignItems:"center",gap:10
            }
          },
          React.createElement("span",{style:{
            width:28,height:28,borderRadius:"50%",
            background:"var(--accentbg)",border:"1px solid var(--border)",
            display:"flex",alignItems:"center",justifyContent:"center",
            fontSize:11,fontWeight:700,color:"var(--accent)",flexShrink:0
          }},p.name.charAt(0).toUpperCase()),
          React.createElement("span",{style:{fontWeight:500}},p.name)

    )
  );
};

/* ── NEW TRANSACTION MODAL ─────────────────────────────────────────────── */
const TxModal=({onAdd,onClose,categories,payees,txTypes,allAccounts,currentAccountId,dispatch,state})=>{
  const flatC=flatCats(categories);
  const EMPTY={date:TODAY(),txType:txTypes[0],amount:"",payee:"",desc:"",cat:flatC[0]||"Income",tags:"",status:"Reconciled",txNum:"",notes:"",srcId:currentAccountId||"",tgtId:"",isScheduled:false,schedFreq:"monthly",schedEnd:""};
  const[f,setF]=useState(EMPTY);
  const set=k=>e=>setF(p=>({...p,[k]:e.target.value}));
  const isTransfer=f.txType==="Transfer";

  const save=(andNew)=>{
    if(!f.amount)return;
    if(f.isScheduled){
      /* Build a scheduled entry */
      if(isTransfer){
        if(!f.srcId||!f.tgtId||f.srcId===f.tgtId)return;
      }
      const ledger=isTransfer?"debit":typeToLedger(f.txType);
      const acc=isTransfer?allAccounts.find(a=>a.id===f.srcId):allAccounts.find(a=>a.id===currentAccountId);
      dispatch({type:"ADD_SCHEDULED",p:{
        desc:f.desc||f.payee||"Scheduled Transaction",
        payee:f.payee,amount:+f.amount,cat:f.cat,txType:f.txType,tags:f.tags,
        ledgerType:ledger,
        accType:acc?acc.accType:"bank",accId:acc?acc.id:(currentAccountId||""),
        frequency:f.schedFreq,
        nextDate:f.date,endDate:f.schedEnd||null,
        status:"active",lastExecuted:null,
        isTransfer,srcId:f.srcId,tgtId:f.tgtId,
        srcAccType:isTransfer?(allAccounts.find(a=>a.id===f.srcId)||{}).accType:"",
        tgtAccType:isTransfer?(allAccounts.find(a=>a.id===f.tgtId)||{}).accType:"",
      }});
      if(andNew)setF({...EMPTY,date:f.date,txType:f.txType});
      else onClose();
      return;
    }
    if(isTransfer){
      if(!f.srcId||!f.tgtId||f.srcId===f.tgtId)return;
      const srcAcc=allAccounts.find(a=>a.id===f.srcId);
      const tgtAcc=allAccounts.find(a=>a.id===f.tgtId);
      onAdd({
        isTransfer:true,
        srcType:srcAcc.accType,srcId:f.srcId,
        tgtType:tgtAcc.accType,tgtId:f.tgtId,
        tx:{...f,amount:+f.amount,cat:"Transfer",type:"debit",id:uid()}
      });
    } else {
      const ledger=typeToLedger(f.txType);
      onAdd({...f,amount:+f.amount,type:ledger,id:uid()});
    }
    if(andNew)setF({...EMPTY,date:f.date,txType:f.txType});

  const[importMFOpen,setImportMFOpen]=useState(false);
  const[importFDOpen,setImportFDOpen]=useState(false);
  const[priceLoad,setPriceLoad]=useState(false);
  const[priceStatus,setPriceStatus]=useState(null); /* {ok:bool, msg:string, ts:Date} */

  const fetchNAV=async()=>{setNavLoad(true);const upd=await Promise.all(mf.map(async m=>{try{const r=await fetch("https://api.mfapi.in/mf/"+m.schemeCode);const d=await r.json();const nav=parseFloat(d.data[0].nav);return{...m,nav,navDate:d.data[0].date,currentValue:nav*m.units};}catch{return m;}}));dispatch({type:"UPD_MF_NAV",p:upd});setNavLoad(false);};

  /* ── Live price fetch: multi-source fallback chain ─────────────────────
     Sources tried in order for each ticker:
     1. Stooq  - direct, no CORS issues, returns CSV, NSE tickers end in .IN
     2. Yahoo Finance v8 via corsproxy.io  - CORS proxy for Yahoo
     3. Yahoo Finance v8 via allorigins.win - second CORS proxy fallback
     4. Yahoo Finance v8 via api.allorigins.win/raw - third fallback
  ──────────────────────────────────────────────────────────────────────── */
  const fetchSharePrices=async()=>{
    if(!shares.length)return;
    setPriceLoad(true);setPriceStatus(null);
    let updated=0,failed=0;

    /* Helper: parse a positive number or return null */
    const pos=v=>{const n=parseFloat(v);return n>0?Math.round(n*100)/100:null;};

    /* ── Source 1: Stooq (direct, no CORS restriction) ── */
    const tryStooq=async(ticker)=>{
      /* Stooq uses lowercase tickers with .in suffix for NSE India */
      const sym=ticker.toLowerCase()+".in";
      try{
        const r=await fetch("https://stooq.com/q/l/?s="+encodeURIComponent(sym)+"&f=sd2t2ohlcv&h&e=csv",{mode:"cors"});
        if(!r.ok)return null;

/* ── Shared tx collector ───────────────────────────────────────────────── */
const collectTx=(data,from,to,accFilter="all")=>{
  let rows=[];
  data.banks.forEach(b=>{
    if(accFilter!=="all"&&accFilter!==b.id)return;
    b.transactions.forEach(t=>{ if(t.date>=from&&t.date<=to) rows.push({...t,accName:b.name,accId:b.id,accType:"bank"}); });
  });
  data.cards.forEach(c=>{
    if(accFilter!=="all"&&accFilter!==c.id)return;
    c.transactions.forEach(t=>{ if(t.date>=from&&t.date<=to) rows.push({...t,accName:c.name,accId:c.id,accType:"card"}); });
  });
  if(accFilter==="all"||accFilter==="__cash__"){
    data.cash.transactions.forEach(t=>{ if(t.date>=from&&t.date<=to) rows.push({...t,accName:"Cash",accId:"__cash__",accType:"cash"}); });
  }
  return rows;
};

  const allTx=[

    ...data.cash.transactions

  const monthly={};
  allTx.forEach(t=>{
    const k=t.date.substr(0,7);
    const ct=catClassType(data.categories,t.cat||"Others");
    if(!monthly[k])monthly[k]={inc:0,exp:0,inv:0};
    if(ct==="Income")monthly[k].inc+=t.amount;
    else if(ct==="Investment")monthly[k].inv+=t.amount;
    else if(ct==="Expense"||t.type==="debit")monthly[k].exp+=t.amount;
  });
  const hist=Object.entries(monthly).sort().slice(-6);
  const avgInc=hist.length?hist.reduce((s,[,v])=>s+v.inc,0)/hist.length:0;

  const mfVal=data.mf.reduce((s,m)=>s+(m.currentValue||m.invested),0);
  const totalAssets=bTotal+data.cash.balance+fdTotal+shVal+mfVal;
  const totalLiab=cDebt+lTotal;
  const netW=totalAssets-totalLiab;

/* ══ 14. NET WORTH TREND ════════════════════════════════════════════════ */
const RptNetWorth=({data})=>{
  /* Approximate historical net worth by unwinding transactions month by month */
  const bankBal=data.banks.reduce((s,b)=>s+b.balance,0);
  const cashBal=data.cash.balance;
  const shVal=data.shares.reduce((s,sh)=>s+sh.qty*sh.currentPrice,0);
  const mfVal=data.mf.reduce((s,m)=>s+(m.currentValue||m.invested),0);
  const fdVal=data.fd.reduce((s,f)=>s+f.amount,0);
  const cDebt=data.cards.reduce((s,c)=>s+c.outstanding,0);
  const lDebt=data.loans.reduce((s,l)=>s+l.outstanding,0);
  const curNW=bankBal+cashBal+shVal+mfVal+fdVal-cDebt-lDebt;

  /* Build monthly delta from all liquid transactions */
  const allTx=[
    ...data.banks.flatMap(b=>b.transactions),
    ...data.cards.flatMap(c=>c.transactions),
    ...data.cash.transactions
  ].filter(t=>t.status!=="Void");
  const monthlyDelta={};
  allTx.forEach(t=>{
    const k=t.date.substr(0,7);
    const ct=catClassType(data.categories,t.cat||"Others");
    if(ct==="Transfer")return;
    if(!monthlyDelta[k])monthlyDelta[k]=0;
    if(t.type==="credit")monthlyDelta[k]+=t.amount;
    else monthlyDelta[k]-=t.amount;
  });
  const months=Object.keys(monthlyDelta).sort().slice(-12);
  /* Walk backwards from current NW */
  let running=curNW;
  const points=[];
  for(let i=months.length-1;i>=0;i--){
    points.unshift({label:months[i].slice(5)+"/"+months[i].slice(2,4),value:running});
    running-=(monthlyDelta[months[i]]||0);
  }
  const assets=[
    {name:"Bank Accounts",val:bankBal,col:"#06b6d4"},
    {name:"Cash",val:cashBal,col:"var(--accent)"},
    {name:"Mutual Funds",val:mfVal,col:"#a78bfa"},
    {name:"Shares",val:shVal,col:"#22c55e"},
    {name:"Fixed Deposits",val:fdVal,col:"#fb923c"},
  ].filter(a=>a.val>0);
  const liabilities=[
    {name:"Credit Card Debt",val:cDebt,col:"#ef4444"},
    {name:"Loan Balances",val:lDebt,col:"#f97316"},
  ].filter(l=>l.val>0);
  const totalAssets=assets.reduce((s,a)=>s+a.val,0);
  const totalLiab=liabilities.reduce((s,l)=>s+l.val,0);
  return React.createElement("div",null,
    React.createElement(RptHeader,{title:"Net Worth Trend",desc:"Estimated month-by-month net worth trajectory over the last 12 months",icon:"📊"}),
    React.createElement("div",{style:{display:"flex",gap:12,flexWrap:"wrap",marginBottom:16}},
      React.createElement(StatCard,{label:"Current Net Worth",val:INR(curNW),col:curNW>=0?"var(--accent)":"#ef4444",icon:"💎"}),
      React.createElement(StatCard,{label:"Total Assets",val:INR(totalAssets),col:"#22c55e",icon:"↑"}),
      React.createElement(StatCard,{label:"Total Liabilities",val:INR(totalLiab),col:"#ef4444",icon:"↓"}),
      React.createElement(StatCard,{label:"Debt-to-Asset",val:totalAssets>0?((totalLiab/totalAssets)*100).toFixed(1)+"%":"--",col:"#fb923c",icon:"⚖"})
    ),
    points.length>=2&&React.createElement(Card,{sx:{marginBottom:14}},
      React.createElement("div",{style:{fontSize:12,color:"var(--text4)",marginBottom:10}},"Estimated net worth over last "+points.length+" months"),
      React.createElement(SvgLine,{data:points,h:170,color:"var(--accent)"})
    ),
    React.createElement("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}},
      React.createElement(Card,null,
        React.createElement("div",{style:{fontSize:12,color:"#22c55e",fontWeight:700,marginBottom:12,textTransform:"uppercase",letterSpacing:.5}},"Assets · "+INR(totalAssets)),
        assets.map(a=>React.createElement(HBar,{key:a.name,label:a.name,value:a.val,max:totalAssets,color:a.col,sub:totalAssets>0?((a.val/totalAssets)*100).toFixed(1)+"%":null}))
      ),
      React.createElement(Card,null,
        React.createElement("div",{style:{fontSize:12,color:"#ef4444",fontWeight:700,marginBottom:12,textTransform:"uppercase",letterSpacing:.5}},"Liabilities · "+INR(totalLiab)),
        liabilities.length>0
          ?liabilities.map(l=>React.createElement(HBar,{key:l.name,label:l.name,value:l.val,max:totalLiab,color:l.col,sub:totalLiab>0?((l.val/totalLiab)*100).toFixed(1)+"%":null}))
          :React.createElement(Empty,{icon:"🎉",text:"No liabilities!"})
      )
    )
  );
};

  const[from,setFrom]=useState(firstDay);
  const[to,setTo]=useState(lastDay);

  const setPreset=(months)=>{
    const t=new Date();
    setFrom(new Date(t.getFullYear(),t.getMonth()-(months-1),1).toISOString().split("T")[0]);

  const toggle=id=>setExpanded(e=>({...e,[id]:!e[id]}));

   SCHEDULED TRANSACTIONS SECTION
   ══════════════════════════════════════════════════════════════════════════ */
const ScheduledSection=({state,dispatch})=>{
  const{scheduled=[],banks,cards,cash,categories}=state;
  const[editSc,setEditSc]=useState(null);
  const[execConfirm,setExecConfirm]=useState(null);
  const[delScConfirm,setDelScConfirm]=useState(null);
  const[showCompleted,setShowCompleted]=useState(false);

  const allAccounts=[
    ...banks.map(b=>({...b,accType:"bank",accTypeLbl:"🏦"})),
    {id:"__cash__",...cash,name:"Cash",accType:"cash",accTypeLbl:"💵"},
    ...cards.map(c=>({...c,accType:"card",accTypeLbl:"💳"}))
  ];
  const getAccName=sc=>{
    if(sc.isTransfer){
      const src=allAccounts.find(a=>a.id===sc.accId);
      const tgt=allAccounts.find(a=>a.id===sc.tgtId);
      return (src?.name||"?")+(" → ")+(tgt?.name||"?");
    }
    const acc=allAccounts.find(a=>a.id===sc.accId);
    return acc?acc.name:"Unknown Account";
  };
  const FREQ_C={once:"#f0a500",daily:"#ef4444",weekly:"#fb923c",monthly:"#22c55e",quarterly:"#06b6d4",yearly:"#a78bfa"};
  const today=TODAY();

/* ── LOCALSTORAGE PERSISTENCE ─────────────────────────────────────────────── */
const LS_KEY="mm_v7_state";
const LS_THEME="mm_v7_theme";

const loadState=()=>{
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(!raw)return null;
    const parsed=JSON.parse(raw);
    // Merge with EMPTY_STATE (not INIT) to pick up new fields without bleeding in sample data
    const def=EMPTY_STATE();
    return {
      ...def,...parsed,
      banks:(parsed.banks||def.banks),
      cards:(parsed.cards||def.cards),
      cash:(parsed.cash||def.cash),
      mf:(parsed.mf||def.mf),
      shares:(parsed.shares||def.shares),
      fd:(parsed.fd||def.fd),
      loans:(parsed.loans||def.loans),
      categories:(parsed.categories||def.categories).map(c=>({classType:"Expense",...c})),
      payees:(parsed.payees||def.payees),
      scheduled:(parsed.scheduled||def.scheduled||[]),
      notes:(parsed.notes||def.notes||[]),
    };
  }catch(e){console.warn("Failed to load state:",e);return null;}
};

const saveState=(s)=>{
  try{localStorage.setItem(LS_KEY,JSON.stringify(s));}
  catch(e){console.warn("Failed to save state:",e);}
};

const loadTheme=()=>{
  try{return localStorage.getItem(LS_THEME)||"ocean";}catch{return "ocean";}
};

const saveTheme=(id)=>{
  try{localStorage.setItem(LS_THEME,id);}catch{}
};

/* ── HASH ROUTING ─────────────────────────────────────────────────────────── */
const VALID_TABS=["dashboard","banks","cards","cash","inv_dash","inv_mf","inv_shares","inv_fd","loans","scheduled","notes","reports","settings"];

const getTabFromHash=()=>{
  const h=window.location.hash.replace("#/","").replace("#","").toLowerCase();
  if(h==="investments")return"inv_mf";
  return VALID_TABS.includes(h)?h:"dashboard";
};

const setHash=(tab)=>{
  window.history.pushState(null,null,"#/"+tab);
};

const useRouting=()=>{
  const[tab,setTabState]=useState(getTabFromHash);
  const setTab=(id)=>{setTabState(id);setHash(id);};
  React.useEffect(()=>{
    const onPop=()=>setTabState(getTabFromHash());
    window.addEventListener("popstate",onPop);
    return()=>window.removeEventListener("popstate",onPop);
  },[]);
  return[tab,setTab];
};

/* ── PERSISTING REDUCER WRAPPER ───────────────────────────────────────────── */
const usePersistentReducer=(reducer,init)=>{
  const[state,rawDispatch]=useReducer(reducer,null,()=>loadState()||init());
  const dispatch=React.useCallback((action)=>{rawDispatch(action);},[]);
  // Save to localStorage whenever state changes (debounced)
  const timerRef=React.useRef(null);
  React.useEffect(()=>{
    if(timerRef.current)clearTimeout(timerRef.current);
    timerRef.current=setTimeout(()=>saveState(state),400);
    return()=>{if(timerRef.current)clearTimeout(timerRef.current);};
  },[state]);
  return[state,dispatch];
};

const NAV=[
  {id:"dashboard", label:"Dashboard"},
  {id:"banks",     label:"Bank Accounts"},
  {id:"cards",     label:"Credit Cards"},
  {id:"cash",      label:"Cash Account"},
  {id:"loans",     label:"Loan Accounts"},
  {id:"scheduled", label:"Scheduled"},
  {id:"__sep_inv__",label:"INVESTMENTS",section:"header"},
  {id:"inv_dash",  label:"Overview"},
  {id:"inv_mf",    label:"Mutual Funds"},
  {id:"inv_shares",label:"Shares"},
  {id:"inv_fd",    label:"Fixed Deposits"},
  {id:"__sep_more__",label:"MORE",section:"header"},
  {id:"notes",     label:"Notes"},
  {id:"reports",   label:"Reports"},
  {id:"settings",  label:"Settings"},
];

function App(){
  const[state,dispatch]=usePersistentReducer(reducer,INIT);
  const[tab,setTab]=useRouting();
  const[themeId,setThemeId]=useState(loadTheme);
  const setTheme=id=>{setThemeId(id);applyTheme(id);saveTheme(id);};
  React.useEffect(()=>{applyTheme(themeId);},[]);
  /* Auto-execute due scheduled transactions on load */
  React.useEffect(()=>{
    const today=TODAY();
    const due=(state.scheduled||[]).filter(sc=>sc.status==="active"&&sc.nextDate&&sc.nextDate<=today);
    if(due.length>0){
      due.forEach(sc=>dispatch({type:"EXECUTE_SCHEDULED",sc}));
    }
  },[]);
  const theme=THEMES.find(t=>t.id===themeId)||THEMES[0];
  const isLight=!theme.dark;
  return React.createElement("div",{style:{display:"flex",height:"100vh",background:"var(--bg)",overflow:"hidden"}},
    React.createElement("div",{style:{width:215,minWidth:215,background:"var(--sidebar)",borderRight:"1px solid var(--border2)",display:"flex",flexDirection:"column",flexShrink:0}},
      React.createElement("div",{style:{padding:"22px 18px 18px",borderBottom:"1px solid var(--border2)"}},
        React.createElement("div",{style:{fontFamily:"'Sora',sans-serif",fontSize:17,fontWeight:800,color:"var(--accent)",letterSpacing:-.3}},"₹ Money Manager"),
        React.createElement("div",{style:{fontSize:10,color:"var(--text8)",marginTop:3,letterSpacing:.4}},"PERSONAL FINANCE · INDIA")
      ),
      React.createElement("nav",{style:{flex:1,padding:"10px 8px",overflowY:"auto"}},
        NAV.map(n=>{
          if(n.section==="header") return React.createElement("div",{key:n.id,style:{
            marginTop:14,marginBottom:4,padding:"5px 12px 3px",
            display:"flex",alignItems:"center",gap:7
          }},
            React.createElement("div",{style:{flex:1,height:1,background:"var(--border2)"}}),
            React.createElement("span",{style:{fontSize:9,fontWeight:700,letterSpacing:1.2,color:"var(--text6)",textTransform:"uppercase",whiteSpace:"nowrap"}},n.label),
            React.createElement("div",{style:{flex:1,height:1,background:"var(--border2)"}})
          );
          return React.createElement("button",{key:n.id,className:"nb",onClick:()=>setTab(n.id),style:{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"10px 12px",borderRadius:10,border:"none",cursor:"pointer",marginBottom:2,fontFamily:"'DM Sans',sans-serif",fontSize:13,fontWeight:tab===n.id?600:400,transition:"all .2s",background:tab===n.id?"var(--subnav-bg)":"transparent",color:tab===n.id?"var(--accent)":"var(--text5)",borderLeft:tab===n.id?"2px solid var(--accent)":"2px solid transparent",textAlign:"left"}},React.createElement(NavIcon,{id:n.id}),n.label);
        })
      ),
      React.createElement("div",{style:{padding:"12px 18px",borderTop:"1px solid var(--border2)",fontSize:10,color:"var(--text5)",lineHeight:1.7}},
        React.createElement("div",{style:{display:"flex",alignItems:"center",gap:5,marginBottom:2}},
          React.createElement("span",{style:{width:6,height:6,borderRadius:"50%",background:"#22c55e",display:"inline-block",boxShadow:"0 0 0 2px #22c55e33"}}),
          React.createElement("span",{style:{color:"#22c55e",fontWeight:600}},"Auto-saved")
        ),
        React.createElement("span",{style:{color:"var(--text7)"}},"Works offline · Data persists"),
        React.createElement("span",{style:{color:"var(--text8)",fontSize:9,marginTop:1,letterSpacing:.3}},"v"+APP_VERSION)
      )
    ),
    React.createElement("div",{style:{flex:1,overflowY:"auto",padding:"24px 24px 40px",display:"flex",flexDirection:"column",background:"var(--bg)"}},
      tab==="dashboard"&&React.createElement(Dashboard,{data:state}),
      tab==="banks"&&React.createElement(BankSection,{banks:state.banks,dispatch,categories:state.categories,payees:state.payees,allBanks:state.banks,allCards:state.cards,cash:state.cash}),
      tab==="cards"&&React.createElement(CardSection,{cards:state.cards,dispatch,categories:state.categories,payees:state.payees,allBanks:state.banks,allCards:state.cards,cash:state.cash}),
      tab==="cash"&&React.createElement(CashSection,{cash:state.cash,dispatch,categories:state.categories,payees:state.payees,allBanks:state.banks,allCards:state.cards}),
      tab==="inv_dash"&&React.createElement(InvestDashboard,{mf:state.mf,shares:state.shares,fd:state.fd,dispatch}),
      tab==="inv_mf"&&React.createElement(InvestSection,{mf:state.mf,shares:state.shares,fd:state.fd,dispatch,defaultTab:"mf"}),
      tab==="inv_shares"&&React.createElement(InvestSection,{mf:state.mf,shares:state.shares,fd:state.fd,dispatch,defaultTab:"shares"}),
      tab==="inv_fd"&&React.createElement(InvestSection,{mf:state.mf,shares:state.shares,fd:state.fd,dispatch,defaultTab:"fd"}),
      tab==="loans"&&React.createElement(LoanSection,{loans:state.loans,dispatch}),
      tab==="notes"&&React.createElement(NotesSection,{notes:state.notes||[],dispatch}),
      tab==="scheduled"&&React.createElement(ScheduledSection,{state,dispatch}),
      tab==="reports"&&React.createElement(ReportsSection,{data:state}),
      tab==="settings"&&React.createElement(SettingsSection,{state,dispatch,themeId,setTheme,onResetAll:()=>{dispatch({type:"RESET_ALL"});try{localStorage.removeItem(LS_KEY);localStorage.removeItem(LS_THEME);}catch{}setTimeout(()=>window.location.reload(),100);}})
    )
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
